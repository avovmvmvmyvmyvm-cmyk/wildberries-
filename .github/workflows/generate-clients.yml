name: Generate clients

on:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (for spec download + Playwright fallback)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download specs
        run: bash scripts/download-specs-from-config.sh

      - name: Update methods list
        run: bash scripts/generate-methods-list.sh

      - name: Bump version
        id: bump
        run: |
          new_version=$(bash scripts/bump-version.sh)
          echo "version=${new_version}" >> "$GITHUB_OUTPUT"

      - name: Generate clients
        env:
          OPENAPI_GENERATOR_DOCKER: "1"
          PACKAGE_VERSION: ${{ steps.bump.outputs.version }}
        run: bash scripts/generate-clients.sh

      - name: Update Python methods list
        run: bash scripts/generate-python-methods-list.sh

      - name: Update npm methods list
        run: bash scripts/generate-npm-methods-list.sh

      - name: Update Go methods list
        run: bash scripts/generate-go-methods-list.sh

      - name: Update PHP methods list
        run: bash scripts/generate-php-methods-list.sh

      - name: Update Rust methods list
        run: bash scripts/generate-rust-methods-list.sh

      - name: Prepare Python package
        run: bash scripts/prepare-pypi-package.sh

      - name: Prepare PHP package
        run: bash scripts/prepare-php-package.sh

      - name: Commit generated clients
        id: commit
        run: |
          git add pyproject.toml README.md composer.json docs/python/README.md docs/npm/README.md docs/go/README.md docs/php/README.md docs/rust/README.md clients/python clients/npm clients/go clients/php clients/rust src
          if git diff --cached --quiet; then
            echo "No client changes to commit."
            echo "did_commit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: regenerate clients"
          git push
          echo "did_commit=true" >> "$GITHUB_OUTPUT"

      - name: Tag release
        if: steps.commit.outputs.did_commit == 'true'
        env:
          PACKAGE_VERSION: ${{ steps.bump.outputs.version }}
          PUSH_TAGS: "1"
        run: bash scripts/tag-release.sh

      - name: Tag Go modules
        if: steps.commit.outputs.did_commit == 'true'
        env:
          PACKAGE_VERSION: ${{ steps.bump.outputs.version }}
          PUSH_TAGS: "1"
        run: bash scripts/tag-go-modules.sh

      - name: Set up Go
        if: steps.commit.outputs.did_commit == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Warm Go proxy
        if: steps.commit.outputs.did_commit == 'true'
        continue-on-error: true
        env:
          PACKAGE_VERSION: ${{ steps.bump.outputs.version }}
        run: bash scripts/warm-go-proxy.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          /usr/bin/python3 -m pip install --upgrade pip build twine
          /usr/bin/python3 -m build

      - name: Upload to PyPI
        continue-on-error: true
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: /usr/bin/python3 -m twine upload --skip-existing dist/*

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Prepare npm package
        env:
          PACKAGE_VERSION: ${{ steps.bump.outputs.version }}
        run: bash scripts/prepare-npm-package.sh

      - name: Build npm package
        working-directory: npm
        run: |
          npm install
          npm run build

      - name: Publish npm package
        working-directory: npm
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Publish npm package to GitHub Packages
        if: steps.commit.outputs.did_commit == 'true'
        working-directory: npm
        continue-on-error: true
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GitHub Packages requires a scoped package name; use the repo owner.
          npm pkg set name="@eslazarev/wildberries-sdk"
          cat > .npmrc <<EOF
          @eslazarev:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${GH_PACKAGES_TOKEN}
          always-auth=true
          EOF
          npm publish --access public
          rm -f .npmrc
          npm pkg set name="wildberries-sdk"

      - name: Pack npm tarball for the GitHub Release
        if: steps.commit.outputs.did_commit == 'true'
        working-directory: npm
        run: |
          npm pack
          mkdir -p ../dist
          mv wildberries-sdk-*.tgz ../dist/

      - name: Create GitHub Release with build artifacts
        if: steps.commit.outputs.did_commit == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          # Tag was pushed by `Tag release` step earlier; attach build artifacts.
          assets=()
          for f in dist/*.whl dist/*.tar.gz dist/*.tgz; do
            [ -f "$f" ] && assets+=("$f")
          done
          gh release create "v${PACKAGE_VERSION}" \
            --title "v${PACKAGE_VERSION}" \
            --notes "Automated release. See [CHANGELOG.md](CHANGELOG.md) for spec changes in this revision." \
            "${assets[@]}"

      - name: Update Packagist
        if: steps.commit.outputs.did_commit == 'true'
        continue-on-error: true
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
        run: |
          if [ -z "$PACKAGIST_USERNAME" ] || [ -z "$PACKAGIST_TOKEN" ]; then
            echo "Packagist credentials not set; skipping."
            exit 0
          fi
          curl -sS -X POST -H "Content-Type: application/json" \
            -d '{"repository":{"url":"https://github.com/eslazarev/wildberries-sdk"}}' \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_TOKEN}"

      - name: Set up Rust
        if: steps.commit.outputs.did_commit == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Publish Rust
        if: steps.commit.outputs.did_commit == 'true'
        continue-on-error: true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CRATES_IO_TOKEN not set; skipping."
            exit 0
          fi
          for crate in clients/rust/*; do
            [ -f "$crate/Cargo.toml" ] || continue
            (cd "$crate" && cargo publish --allow-dirty)
          done
