name: Dependency Audit

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 9 * * *'

permissions:
  contents: read

jobs:
  python-audit:
    name: Python (pip-audit)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install --upgrade pip pip-audit

      - name: Audit root pyproject.toml
        run: pip-audit --disable-pip --progress-spinner off || true

  npm-audit:
    name: npm (npm audit)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit npm packages
        run: |
          set +e
          for dir in npm clients/npm/*; do
            if [ -f "$dir/package.json" ]; then
              echo "::group::$dir"
              (
                cd "$dir"
                npm install --ignore-scripts --no-audit --no-fund --package-lock-only || true
                npm audit --omit=dev || true
              )
              echo "::endgroup::"
            fi
          done

  composer-audit:
    name: PHP (composer audit)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Audit composer packages
        run: |
          set +e
          for dir in . clients/php/*; do
            if [ -f "$dir/composer.json" ]; then
              echo "::group::$dir"
              (
                cd "$dir"
                composer update --no-scripts --no-progress --no-interaction --no-install || true
                composer audit --no-dev --abandoned=ignore || true
              )
              echo "::endgroup::"
            fi
          done

  cargo-audit:
    name: Rust (cargo audit)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit cargo crates
        run: |
          set +e
          for crate in clients/rust/*; do
            if [ -f "$crate/Cargo.toml" ]; then
              echo "::group::$crate"
              (
                cd "$crate"
                cargo generate-lockfile || true
                cargo audit || true
              )
              echo "::endgroup::"
            fi
          done

  go-audit:
    name: Go (govulncheck)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Audit Go modules
        run: |
          set +e
          for mod in clients/go/*; do
            if [ -f "$mod/go.mod" ]; then
              echo "::group::$mod"
              (
                cd "$mod"
                go mod tidy || true
                govulncheck ./... || true
              )
              echo "::endgroup::"
            fi
          done
