      properties:
        charcID:
          description: ID характеристики
          type: integer
        subjectName:
          description: Название предмета
          type: string
        subjectID:
          description: ID предмета
          type: integer
        name:
          description: Название характеристики
          type: string
        required:
          description: |
            - `true` — характеристику необходимо обязательно указать в карточке товара
            - `false` — характеристику необязательно указывать
          type: boolean
        unitName:
          description: Единица измерения
          type: string
        maxCount:
          description: |
            Максимальное количество значений, которое можно присвоить характеристике при [создании](./work-with-products#tag/Sozdanie-kartochek-tovarov) или [редактировании](./work-with-products#tag/Kartochki-tovarov/paths/~1content~1v2~1cards~1update/post) карточек товаров.
            <br>
            Используется только для характеристик с `"charcType":1` — массив строк.
            <br>
            Характеристикам с `"charcType":4` — число, можно присвоить только одно значение.
            <br><br>
            Если `"maxCount":0`, количество значений не ограничено
          type: integer
        popular:
          description: "Характеристика популярна у пользователей (true - да, false\
            \ - нет)"
          type: boolean
        charcType:
          description: |
            Тип данных характеристики, который необходимо использовать при [создании](./work-with-products#tag/Sozdanie-kartochek-tovarov) или [редактировании](./work-with-products#tag/Kartochki-tovarov/paths/~1content~1v2~1cards~1update/post) карточек товаров:
              -  `1` — массив строк
              -  `4` — число (целое либо с десятичной дробью)
              -  `0` — характеристика не используется
          type: integer
        hasFilter:
          description: |
            Ключевая характеристика. Является ли характеристика значимой для покупателей:
              - `true` — да
              - `false` — нет
          type: boolean
        isVariable:
          description: |
            Признак [меняющейся характеристики](https://dev.wildberries.ru/knowledge-base/articles/019d49a4-1320-71bb-9dac-8ba07e7177ce/rabota-s-tovarami#obuedinenie-i-razuedinenie-kartochek-tovarov). Значение размечает характеристики, по которым варианты отличаются друг от друга:
              -  `true` — варианты товара отличаются по этой характеристике
              -  `false` — варианты товара не отличаются по этой характеристике
          type: boolean
        existNamedField:
          description: |
            Как передать характеристику в запросах на [cоздание](./work-with-products#tag/Sozdanie-kartochek-tovarov/paths/~1content~1v2~1cards~1upload/post), [создание с присоединением](./work-with-products/#tag/Sozdanie-kartochek-tovarov/paths/~1content~1v2~1cards~1upload~1add/post) и [редактирование](./work-with-products/#tag/Kartochki-tovarov/paths/~1content~1v2~1cards~1update/post) карточек товара:
              -  `true` — в соответствующем параметре запроса
              -  `false` — внутри массива `characteristics`
          type: boolean
      type: object
