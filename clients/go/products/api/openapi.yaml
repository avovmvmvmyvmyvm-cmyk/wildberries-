          Язык полей ответа:
            - `ru` — русский
            - `en` — английский
            - `zh` — китайский

          Не используется в песочнице
        explode: true
        in: query
        name: locale
        required: false
        schema:
          example: en
          type: string
        style: form
      - description: "Поиск по названию предмета (Носки), поиск работает по подстр\
          оке, искать можно на любом из поддерживаемых языков"
        explode: true
        in: query
        name: name
        required: false
        schema:
          example: Носки
          type: string
        style: form
      - description: "Количество предметов, максимум 1000"
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 30
          example: 1000
          type: integer
        style: form
      - description: "Сколько элементов пропустить. Например, для значения `10` от\
          вет начнется с 11 элемента"
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          example: 5000
          type: integer
        style: form
      - description: ID родительской категории предмета
        explode: true
        in: query
        name: parentID
        required: false
        schema:
          example: 1000
          type: integer
        style: form
