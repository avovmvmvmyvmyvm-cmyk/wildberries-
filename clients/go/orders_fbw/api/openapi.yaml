              schema:
                $ref: "#/components/schemas/_api_v1_acceptance_options_post_401_response"
          description: Слишком много запросов
      security:
      - HeaderApiKey: []
      summary: Опции приёмки
      tags:
      - Информация для формирования поставок
      x-readonly-method: true
      x-category: supplies
