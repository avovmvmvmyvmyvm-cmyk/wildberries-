openapi: 3.0.0
info:
  description: |
    <div class="description_important">
        Узнать больше о комиссиях и тарифах можно в <a href="https://seller.wildberries.ru/instructions/category/a04560b5-256d-48cb-8f09-60e283b5d493">справочном центре</a>
    </div>

    В разделе описаны методы получения:
      1. [Комиссий](/openapi/wb-tariffs#tag/Komissii)
      2. [Тарифов на остаток](/openapi/wb-tariffs#tag/Tarify-na-ostatok)
      3. [Тарифов на возврат товаров продавцу](/openapi/wb-tariffs#tag/Stoimost-vozvrata-prodavcu)
  title: Тарифы
  version: tariffs
  x-file-name: tariffs
servers:
- url: /
security:
- HeaderApiKey: []
tags:
- description: ""
  name: Комиссии
- description: ""
  name: Тарифы на остаток
- description: ""
  name: Тарифы на поставку
- description: ""
  name: Стоимость возврата продавцу
paths:
  /api/v1/tariffs/commission:
    get:
      description: |
        Метод возвращает данные о [комиссии](https://seller.wildberries.ru/dynamic-product-categories/commission) WB по [родительским категориям товаров](/openapi/work-with-products#tag/Kategorii-predmety-i-harakteristiki/paths/~1content~1v2~1object~1parent~1all/get) согласно модели продаж.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:

        | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- |
        | 1 минута | 1 запрос | 1 минута | 2 запроса |
        </div>
      parameters:
      - description: |
          Язык полей ответа `parentName` и `subjectName`:
            - `ru` — русский
            - `en` — английский
            - `zh` — китайский
        explode: true
        in: query
        name: locale
        required: false
        schema:
          example: ru
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                Commission:
                  $ref: "#/components/examples/Commission"
                CommissionChina:
                  $ref: "#/components/examples/CommissionChina"
                CommissionTurkey:
                  $ref: "#/components/examples/CommissionTurkey"
                CommissionUzbekistan:
                  $ref: "#/components/examples/CommissionUzbekistan"
                CommissionUAE:
                  $ref: "#/components/examples/CommissionUAE"
              schema:
                $ref: "#/components/schemas/_api_v1_tariffs_commission_get_200_response"
          description: Успешно
        "400":
          content:
            application/problem+json:
              example:
                detail: "parameter \"locale\" in query has an error: value is not\
                  \ one of the allowed values [\"ru\",\"en\",\"zh\"]"
                origin: api-statistics
                requestId: 102d2641a931c41bed60649d6c99d80a
                title: Bad Request
              schema:
                $ref: "#/components/schemas/BadRequest"
          description: Неправильный запрос
        "401":
          content:
            application/problem+json:
              example:
                title: unauthorized
                detail: "token problem; token is malformed: could not base64 decode\
                  \ signature: illegal base64 data at input byte 84"
                code: "07e4668e--a53a3d31f8b0-[UK-oWaVDUqNrKG]; 03bce=277; 84bd353bf-75"
                requestId: 7b80742415072fe8b6b7f7761f1d1211
                origin: s2s-api-auth-catalog
                status: 401
                statusText: Unauthorized
                timestamp: 2024-09-30T06:52:38Z
              schema:
                $ref: "#/components/schemas/_api_v1_tariffs_commission_get_401_response"
          description: Не авторизован
        "429":
          content:
            application/problem+json:
              example:
                title: too many requests
                detail: limited by c122a060-a7fb-4bb4-abb0-32fd4e18d489
                code: "07e4668e-ac2242c5c8c5-[UK-4dx7JUdskGZ]"
                requestId: 9d3c02cc698f8b041c661a7c28bed293
                origin: s2s-api-auth-catalog
                status: 429
                statusText: Too Many Requests
                timestamp: 2024-09-30T06:52:38Z
              schema:
                $ref: "#/components/schemas/_api_v1_tariffs_commission_get_401_response"
          description: Слишком много запросов
      summary: Комиссия по категориям товаров
      tags:
      - Комиссии
      x-readonly-method: true
      x-category: commonapi
    servers:
    - url: https://common-api.wildberries.ru
  /api/v1/tariffs/box:
    get:
      description: |
        Для товаров, которые поставляются на склад в коробах, метод возвращает [тарифы на остаток](https://seller.wildberries.ru/dynamic-product-categories):
          - доставка со склада или пункта приёма до покупателя
          - доставка от покупателя до пункта приёма
          - хранение на складе WB

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:

        | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- |
        | 1 минута | 60 запросов | 1 секунда | 5 запросов |
        </div>
      parameters:
      - description: Дата в формате ГГГГ-ММ-ДД
        explode: true
        in: query
        name: date
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TariffsBoxResponse"
          description: Успешно
        "400":
          content:
            application/problem+json:
              example:
                detail: Invalid date param
                origin: tariffs
                requestId: 70da980b108e6f52ce7630921bd05b1a
                title: Bad Request
              schema:
                $ref: "#/components/schemas/BadRequest"
          description: Неправильный запрос
        "401":
          content:
            application/problem+json:
              example:
                title: unauthorized
                detail: "token problem; token is malformed: could not base64 decode\
                  \ signature: illegal base64 data at input byte 84"
                code: "07e4668e--a53a3d31f8b0-[UK-oWaVDUqNrKG]; 03bce=277; 84bd353bf-75"
                requestId: 7b80742415072fe8b6b7f7761f1d1211
                origin: s2s-api-auth-catalog
                status: 401
                statusText: Unauthorized
                timestamp: 2024-09-30T06:52:38Z
              schema:
                $ref: "#/components/schemas/_api_v1_tariffs_commission_get_401_response"
          description: Не авторизован
        "429":
          content:
            application/problem+json:
              example:
                title: too many requests
                detail: limited by c122a060-a7fb-4bb4-abb0-32fd4e18d489
                code: "07e4668e-ac2242c5c8c5-[UK-4dx7JUdskGZ]"
                requestId: 9d3c02cc698f8b041c661a7c28bed293
                origin: s2s-api-auth-catalog
                status: 429
                statusText: Too Many Requests
                timestamp: 2024-09-30T06:52:38Z
              schema:
                $ref: "#/components/schemas/_api_v1_tariffs_commission_get_401_response"
          description: Слишком много запросов
      summary: Тарифы для коробов
      tags:
      - Тарифы на остаток
      x-readonly-method: true
      x-category: commonapi
    servers:
    - url: https://common-api.wildberries.ru
