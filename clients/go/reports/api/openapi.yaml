  /api/v1/supplier/stocks:
    get:
      description: |
        Метод возвращает остатки товаров на складах WB.

        <div class="description_important">
          Данные этого отчёта могут обновляться с задержкой в несколько часов относительно реальных изменений
        </div>

        Не рекомендуем использовать данный отчёт для оперативного переключения между FBW и FBS логистикой. Для контроля актуальных остатков используйте [Отчёт об остатках на складах](/openapi/reports#tag/Otchyot-ob-ostatkah-na-skladah).<br><br>

        Сервис не хранит историю наличия товаров на складах, поэтому вы можете получить данные об остатках только в режиме реального времени.<br><br>

        Для одного ответа в системе установлено условное ограничение 60000 строк. Поэтому, чтобы получить все остатки, может потребоваться более, чем один запрос. Во втором и далее запросе в параметре `dateFrom` используйте полное значение поля `lastChangeDate` из последней строки ответа на предыдущий запрос.<br> Если в ответе отдаётся пустой массив `[]`, все остатки уже выгружены.

        <div class="description_limit">
          <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:

          | Период | Лимит | Интервал | Всплеск |
          | --- | --- | --- | --- |
          | 1 минута | 1 запрос | 1 минута | 1 запрос |
        </div>
      parameters:
      - description: |
          Дата и время последнего изменения по товару. <br>
          Для получения полного остатка следует указывать максимально раннее значение. <br>
          Например, `2019-06-20` <br>
          Дата в формате RFC3339. Можно передать дату или дату со временем.
          Время можно указывать с точностью до [секунд](./api-information#tag/Vvedenie/Limity-zaprosov) или миллисекунд. <br>
          Время передаётся в часовом поясе Москва (UTC+3).
          <br>Примеры:
            - `2019-06-20`
            - `2019-06-20T23:59:59`
            - `2019-06-20T00:00:00.12345`
            - `2017-03-25T00:00:00`
        explode: true
        in: query
        name: dateFrom
        required: true
        schema:
          format: date-time
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
              - lastChangeDate: 2023-07-05T11:13:35
                warehouseName: Краснодар
                supplierArticle: "443284"
                nmId: 1439871458
                barcode: "2037401340280"
                quantity: 33
                inWayToClient: 1
                inWayFromClient: 0
                quantityFull: 34
                category: Посуда и инвентарь
                subject: Формы для запекания
                brand: X
                techSize: "0"
                Price: 185
                Discount: 0
                isSupply: true
                isRealization: false
                SCCode: Tech
              schema:
                items:
                  $ref: "#/components/schemas/StocksItem"
                type: array
          description: Успешно
        "400":
          content:
            application/json:
              examples:
                DateFromFieldRequired:
                  $ref: "#/components/examples/DateFromFieldRequired"
                DateFromValueNotValidated:
                  $ref: "#/components/examples/DateFromValueNotValidated"
              schema:
                $ref: "#/components/schemas/_api_v1_supplier_incomes_get_400_response"
          description: Неправильный запрос
        "401":
          content:
            application/problem+json:
              example:
                title: unauthorized
                detail: "token problem; token is malformed: could not base64 decode\
                  \ signature: illegal base64 data at input byte 84"
                code: "07e4668e--a53a3d31f8b0-[UK-oWaVDUqNrKG]; 03bce=277; 84bd353bf-75"
                requestId: 7b80742415072fe8b6b7f7761f1d1211
                origin: s2s-api-auth-catalog
                status: 401
                statusText: Unauthorized
                timestamp: 2024-09-30T06:52:38Z
              schema:
                $ref: "#/components/schemas/_api_v1_supplier_incomes_get_401_response"
          description: Не авторизован
        "429":
          content:
            application/problem+json:
              example:
                title: too many requests
                detail: limited by c122a060-a7fb-4bb4-abb0-32fd4e18d489
                code: "07e4668e-ac2242c5c8c5-[UK-4dx7JUdskGZ]"
                requestId: 9d3c02cc698f8b041c661a7c28bed293
                origin: s2s-api-auth-catalog
                status: 429
                statusText: Too Many Requests
                timestamp: 2024-09-30T06:52:38Z
              schema:
                $ref: "#/components/schemas/_api_v1_supplier_incomes_get_401_response"
          description: Слишком много запросов
      security:
      - HeaderApiKey: []
      summary: Склады
      tags:
      - Основные отчёты
      x-readonly-method: true
      x-category: statistics
    servers:
    - url: https://statistics-api.wildberries.ru
  /api/v1/supplier/orders:
    get:
      description: |
        Метод возвращает информацию о заказах.<br>Данные обновляются раз в 30 минут.<br><br>

        1 строка = 1 заказ = 1 сборочное задание = 1 единица товара.<br>Для определения заказа рекомендуем использовать поле `srid`.<br><br>

        Информация о заказе хранится 90 дней с момента оформления.<br><br>

        В ответах могут отсутствовать заказы, по которым не подтверждена оплата. Например, заказы с отложенными платежами или оплатой в рассрочку. При этом, если по таким заказам есть продажи, вы можете получить их с помощью [детализаций к отчётам реализации](/openapi/financial-reports-and-accounting#tag/Finansovye-otchyoty/paths/~1api~1v5~1supplier~1reportDetailByPeriod/get).<br>
        Чтобы получить все оформленные заказы, используйте [Ленту заказов](https://seller.wildberries.ru/content-analytics/order-feed) в личном кабинете.

        <div class="description_important">
          Данные этого отчёта являются предварительными и служат для оперативного мониторинга
        </div>

        Для одного ответа на запрос с `flag=0` или без `flag` в системе установлено условное ограничение 80000 строк. Поэтому, чтобы получить все заказы, может потребоваться более, чем один запрос. Во втором и далее запросе в параметре `dateFrom` используйте полное значение поля `lastChangeDate` из последней строки ответа на предыдущий запрос.<br> Если в ответе отдаётся пустой массив `[]`, все заказы уже выгружены.

        <div class="description_limit">
          <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:

          | Период | Лимит | Интервал | Всплеск |
          | --- | --- | --- | --- |
          | 1 минута | 1 запрос | 1 минута | 1 запрос |
        </div>
      parameters:
      - description: |
          Дата и время последнего изменения по заказу. <br>
          Дата в формате RFC3339. Можно передать дату или дату со временем.
          Время можно указывать с точностью до [секунд](./api-information#tag/Vvedenie/Limity-zaprosov) или миллисекунд. <br>
          Время передаётся в часовом поясе Москва (UTC+3).
          <br>Примеры:
            - `2019-06-20`
            - `2019-06-20T23:59:59`
            - `2019-06-20T00:00:00.12345`
            - `2017-03-25T00:00:00`
        explode: true
        in: query
        name: dateFrom
        required: true
        schema:
          format: date-time
          type: string
        style: form
      - description: |
          Если параметр `flag=0` (или не указан в строке запроса), при вызове API возвращаются данные,
          у которых значение поля `lastChangeDate` (дата время обновления информации в сервисе) больше или равно переданному
          значению параметра `dateFrom`.
          При этом количество возвращенных строк данных варьируется в интервале от 0 до примерно 80000.
          <br>
          Если параметр `flag=1`, то будет выгружена информация обо всех заказах или продажах с датой,
          равной переданному параметру `dateFrom` (в данном случае время в дате значения не имеет).
          При этом количество возвращенных строк данных будет равно количеству всех заказов или продаж,
          сделанных в указанную дату, переданную в параметре `dateFrom`.
        explode: true
        in: query
        name: flag
        required: false
        schema:
          default: 0
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
              - date: 2022-03-04T18:08:31
                lastChangeDate: 2022-03-06T10:11:07
                warehouseName: Подольск
                warehouseType: Склад продавца
                countryName: Россия
                oblastOkrugName: Центральный федеральный округ
                regionName: Московская
                supplierArticle: "12345"
                nmId: 1234567
                barcode: "123453559000"
                category: Бытовая техника
                subject: Мультистайлеры
                brand: Тест
                techSize: "0"
                incomeID: 56735459
                isSupply: false
                isRealization: true
                totalPrice: 1887
                discountPercent: 18
                spp: 26
                finishedPrice: 1145
                priceWithDisc: 1547
                isCancel: true
                cancelDate: 2022-03-09T00:00:00
                sticker: "926912515"
                gNumber: "34343462218572569531"
                srid: 11.rf9ef11fce1684117b0nhj96222982382.3.0
              schema:
                items:
                  $ref: "#/components/schemas/OrdersItem"
                type: array
          description: Успешно
        "400":
          content:
            application/json:
              examples:
                DateFromFieldRequired:
                  $ref: "#/components/examples/DateFromFieldRequired"
                DateFromValueNotValidated:
                  $ref: "#/components/examples/DateFromValueNotValidated"
              schema:
                $ref: "#/components/schemas/_api_v1_supplier_incomes_get_400_response"
          description: Неправильный запрос
        "401":
          content:
            application/problem+json:
              example:
                title: unauthorized
                detail: "token problem; token is malformed: could not base64 decode\
                  \ signature: illegal base64 data at input byte 84"
                code: "07e4668e--a53a3d31f8b0-[UK-oWaVDUqNrKG]; 03bce=277; 84bd353bf-75"
                requestId: 7b80742415072fe8b6b7f7761f1d1211
                origin: s2s-api-auth-catalog
                status: 401
                statusText: Unauthorized
                timestamp: 2024-09-30T06:52:38Z
              schema:
                $ref: "#/components/schemas/_api_v1_supplier_incomes_get_401_response"
          description: Не авторизован
        "429":
          content:
            application/problem+json:
              example:
                title: too many requests
                detail: limited by c122a060-a7fb-4bb4-abb0-32fd4e18d489
                code: "07e4668e-ac2242c5c8c5-[UK-4dx7JUdskGZ]"
                requestId: 9d3c02cc698f8b041c661a7c28bed293
                origin: s2s-api-auth-catalog
                status: 429
                statusText: Too Many Requests
                timestamp: 2024-09-30T06:52:38Z
              schema:
                $ref: "#/components/schemas/_api_v1_supplier_incomes_get_401_response"
          description: Слишком много запросов
      security:
      - HeaderApiKey: []
      summary: Заказы
      tags:
      - Основные отчёты
      x-readonly-method: true
      x-category: statistics
    servers:
    - url: https://statistics-api.wildberries.ru
  /api/v1/supplier/sales:
    get:
      description: |
        Метод возвращает информацию о продажах и возвратах.<br>Данные обновляются раз в 30 минут.<br><br>

        1 строка = 1 заказ = 1 сборочное задание = 1 единица товара.<br>Для определения заказа рекомендуем использовать поле `srid`.<br><br>

        Информация о заказе хранится 90 дней с момента оформления.

        <div class="description_important">
          Данные этого отчёта являются предварительными и служат для оперативного мониторинга
        </div>

          - В ответах могут отсутствовать заказы, по которым не подтверждена оплата, даже если эти заказы есть в детализациях к отчётам реализации. Например, заказы с отложенными платежами или оплатой в рассрочку
          - Значения полей `priceWithDisc` и `forPay` рассчитываются по упрощённой логике и могут отличаться от `retail_price_withdisc_rub` и `ppvz_for_pay` соответственно в детализациях к отчётам реализации
          - Поля `finishedPrice`, `priceWithDisc`, `forPay` могут временно иметь значение `0`: данные заполняются асинхронно, актуализируются в течение 24 часов
          - Для заказов, которые оплачены в валюте, отличной от валюты продавца, возможны округления цен из-за конвертации валют

        Для точных финансовых расчётов, сверки и отчётности используйте [детализации к отчётам реализации](/openapi/financial-reports-and-accounting#tag/Finansovye-otchyoty/paths/~1api~1v5~1supplier~1reportDetailByPeriod/get).<br><br>

