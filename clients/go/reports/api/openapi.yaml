        | 1 мин | 1 запрос | 1 мин | 5 запросов |
        </div>
      parameters:
      - description: |
          Язык полей ответа `subjectName` и `warehouseName`:
            - `ru` — русский
            - `en` — английский
            - `zh` — китайский. Значения `warehouseName` на английском
        explode: true
        in: query
        name: locale
        required: false
        schema:
          default: ru
          example: ru
          type: string
        style: form
      - description: Разбивка по брендам
        explode: true
        in: query
        name: groupByBrand
        required: false
        schema:
          default: false
          example: true
          type: boolean
        style: form
      - description: Разбивка по предметам
        explode: true
        in: query
        name: groupBySubject
        required: false
        schema:
          default: false
          example: true
          type: boolean
        style: form
      - description: Разбивка по артикулам продавца
        explode: true
        in: query
        name: groupBySa
        required: false
        schema:
          default: false
          example: true
          type: boolean
        style: form
      - description: "Разбивка по артикулам WB. Если `groupByNm=true`, в ответе бу\
          дет поле `volume`"
        explode: true
        in: query
        name: groupByNm
        required: false
        schema:
          default: false
          example: true
          type: boolean
        style: form
      - description: Разбивка по баркодам
        explode: true
        in: query
        name: groupByBarcode
        required: false
        schema:
          default: false
          example: true
          type: boolean
        style: form
      - description: Разбивка по размерам
        explode: true
        in: query
        name: groupBySize
        required: false
        schema:
          default: false
          example: true
          type: boolean
        style: form
      - description: |
          Фильтр по фото:
            - `-1` — без фото
            - `0` — не применять фильтр
            - `1` — с фото
        explode: true
        in: query
        name: filterPics
        required: false
        schema:
          default: 0
          example: 1
          type: integer
        style: form
      - description: |
          Фильтр по объёму:
            - `-1` — без габаритов
            - `0` — не применять фильтр
            - `3` — свыше трёх литров
        explode: true
        in: query
        name: filterVolume
        required: false
        schema:
          default: 0
          example: 3
          type: integer
        style: form
