  /api/v3/dbw/orders/status:
    post:
      description: "Метод возвращает статусы сборочных заданий по их ID.\n<br><br>\n\
        `supplierStatus` — статус сборочного задания.\nТриггер его изменения — дей\
        ствие самого продавца.\n\nВозможные значения `supplierStatus`:\n| Статус \
        \  | Описание            | Как перевести сборочное задание в данный статус\
        \ |\n| -------  | ---------           | --------------------------------------|\n\
        | `new`      | **Новое сборочное задание** | |\n| `confirm`  | **На сборке\
        **      |  [Перевести сборочное задание на сборку](/openapi/orders-dbw#tag/Sborochnye-zadaniya-DBW/paths/~1api~1v3~1dbw~1orders~1{orderId}~1confirm/patch)\n\
        | `complete` | **В доставке**  | [Перевести сборочное задание в доставку](/openapi/orders-dbw#tag/Sborochnye-zadaniya-DBW/paths/~1api~1v3~1dbw~1orders~1%7BorderId%7D~1assemble/patch)\
        \ |\n| `receive`  | **Получено покупателем**|  Переводится курьером\n| `reject`\
        \   | **Отказ покупателя при получении**| Переводится курьером\n| `cancel`\
        \   | **Отменено продавцом**   |  [Отменить сборочное задание](/openapi/orders-dbw#tag/Sborochnye-zadaniya-DBW/paths/~1api~1v3~1dbw~1orders~1{orderId}~1cancel/patch)\n\
        | `cancel_missed_call` | **Отмена по причине недозвона**<br> | Статус меня\
        ется автоматически |\n\n<br><br>\n`wbStatus` — статус системы Wildberries.\n\
        \nВозможные значения `wbStatus`:\n- `waiting` — сборочное задание в работе\
        \n- `sold` — заказ получен покупателем\n- `canceled` — отмена сборочного з\
        адания\n- `canceled_by_client` — покупатель отменил заказ при получении\n\
        - `declined_by_client` — покупатель отменил заказ в первый чаc\n<br>\nОтме\
        на доступна покупателю в первый час с момента заказа, если заказ не переве\
        ден на сборку\n- `defect` — отмена заказа по причине брака\n- `canceled_by_missed_call`\
        \ — отмена заказа по причине недозвона\n- `postponed_delivery` — курьерска\
        я доставка отложена\n\n<div class=\"description_limit\">\n<a href=\"/openapi/api-information#tag/Vvedenie/Limity-zaprosov\"\
        >Лимит запросов</a> на один аккаунт продавца для следующих методов DBW:\n\
        <ul>\n    <li>получение и обновление списка контактов</li>\n    <li>получе\
        ние и удаление метаданных</li>\n    <li>методы сборочных заданий</li>\n</ul>\
        \ \n\n| Период | Лимит | Интервал | Всплеск |\n| --- | --- | --- | --- |\n\
        | 1 минута | 300 запросов | 200 миллисекунд | 20 запросов |\n\nОдин запрос\
        \ с кодом ответа <code>409</code> учитывается как 10 запросов\n</div>\n"
