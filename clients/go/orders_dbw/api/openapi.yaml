        ить данные за заданный период, максимум 30 календарных дней одним запросом\
        .\n\n<div class=\"description_limit\">\n<a href=\"/openapi/api-information#tag/Vvedenie/Limity-zaprosov\"\
        >Лимит запросов</a> на один аккаунт продавца для следующих методов DBW:\n\
        <ul>\n    <li>получение и обновление списка контактов</li>\n    <li>получе\
        ние и удаление метаданных</li>\n    <li>методы сборочных заданий</li>\n</ul>\
        \ \n\n| Период | Лимит | Интервал | Всплеск |\n| --- | --- | --- | --- |\n\
        | 1 мин | 300 запросов | 200 мс | 20 запросов |\n\nОдин запрос с кодом отв\
        ета <code>409</code> учитывается как 10 запросов\n</div>\n"
      parameters:
      - description: Параметр пагинации. Устанавливает предельное количество возвращаемых
          данных
        explode: true
        in: query
        name: limit
        required: true
        schema:
          maximum: 1000
          minimum: 1
          type: integer
        style: form
      - description: "Параметр пагинации. Устанавливает значение, с которого надо\
          \ получить следующий пакет данных. Для получения полного списка данных д\
          олжен быть равен `0` в первом запросе. Для следующих запросов необходимо\
          \ брать значения из одноименного поля в ответе"
        explode: true
        in: query
        name: next
        required: true
        schema:
          format: int64
          type: integer
        style: form
      - description: |
          Дата начала периода в формате Unix timestamp
        explode: true
        in: query
        name: dateFrom
        required: true
        schema:
          type: integer
        style: form
      - description: Дата конца периода в формате Unix timestamp
        explode: true
        in: query
        name: dateTo
        required: true
        schema:
          type: integer
        style: form
      responses:
