openapi: 3.0.1
info:
  description: |
    С помощью методов Заказы DBW (Доставка курьером WB) вы можете:
      - получать информацию о [сборочных заданиях](/openapi/orders-dbw#tag/Sborochnye-zadaniya-DBW), управлять статусами и отменять сборочные задания
      - получать, добавлять, редактировать и удалять [метаданные](/openapi/orders-dbw#tag/Metadannye-DBW) сборочных заданий

    <div class="description_ref">
      Узнать, как использовать методы в бизнес-кейсах, можно в <a href="https://dev.wildberries.ru/knowledge-base/articles/019d49a4-036a-7721-98e8-bed5f1a4f72d/zakazy-dbw">инструкции</a> по работе с <strong>заказами DBW</strong>
    </div>
  title: Заказы DBW
  version: ordersdbw
  x-file-name: orders-dbw
servers:
- url: /
security:
- HeaderApiKey: []
tags:
- description: ""
  name: Сборочные задания DBW
- description: ""
  name: Метаданные DBW
paths:
  /api/v3/dbw/orders/new:
    get:
      description: "Метод возвращает список всех новых [сборочных заданий](/openapi/orders-dbw#tag/Sborochnye-zadaniya-DBW),\
        \ которые есть у продавца на момент запроса.\n\n<div class=\"description_limit\"\
        >\n<a href=\"/openapi/api-information#tag/Vvedenie/Limity-zaprosov\">Лимит\
        \ запросов</a> на один аккаунт продавца для следующих методов DBW:\n<ul>\n\
        \    <li>получение и обновление списка контактов</li>\n    <li>получение и\
        \ удаление метаданных</li>\n    <li>методы сборочных заданий</li>\n</ul> \n\
        \n| Период | Лимит | Интервал | Всплеск |\n| --- | --- | --- | --- |\n| 1\
        \ мин | 300 запросов | 200 мс | 20 запросов |\n\n</div>\n"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_api_v3_dbw_orders_new_get_200_response"
          description: Успешно
        "401":
          content:
            application/problem+json:
              example:
                title: unauthorized
                detail: "token problem; token is malformed: could not base64 decode\
                  \ signature: illegal base64 data at input byte 84"
                code: "07e4668e--a53a3d31f8b0-[UK-oWaVDUqNrKG]; 03bce=277; 84bd353bf-75"
                requestId: 7b80742415072fe8b6b7f7761f1d1211
                origin: s2s-api-auth-catalog
                status: 401
                statusText: Unauthorized
                timestamp: 2024-09-30T06:52:38Z
              schema:
                $ref: "#/components/schemas/_api_v3_dbw_orders_new_get_401_response"
          description: Не авторизован
        "402":
          content:
            application/problem+json:
              example:
                title: payment required
                detail: wb solution for business has insufficient funds on its balance.
                  please top up the balance in the company's personal account https://dev.wildberries.ru/company
              schema:
                $ref: "#/components/schemas/_api_v3_dbw_orders_new_get_402_response"
          description: Требуется платёж
        "403":
          content:
            application/json:
              example:
                code: AccessDenied
                message: ""
              schema:
                $ref: "#/components/schemas/Error"
          description: Доступ запрещён
        "429":
          content:
            application/problem+json:
              example:
                title: too many requests
                detail: limited by c122a060-a7fb-4bb4-abb0-32fd4e18d489
                code: "07e4668e-ac2242c5c8c5-[UK-4dx7JUdskGZ]"
                requestId: 9d3c02cc698f8b041c661a7c28bed293
                origin: s2s-api-auth-catalog
                status: 429
                statusText: Too Many Requests
                timestamp: 2024-09-30T06:52:38Z
