  /api/v3/dbw/orders/stickers:
    post:
      description: "Метод возвращает список стикеров для [сборочных заданий](/openapi/orders-dbw#tag/Sborochnye-zadaniya-DBW/paths/~1api~1v3~1dbw~1orders~1new/get).\n\
        \nМожно получить стикер в форматах:\n  - SVG\n  - ZPLV (вертикальный)\n  -\
        \ ZPLH (горизонтальный)\n  - PNG\n\nОграничения:\n  - За один запрос можно\
        \ получить максимум 100 стикеров.\n  - Можно получить стикеры только для с\
        борочных заданий, находящихся на сборке — [статус](/openapi/orders-dbw#tag/Sborochnye-zadaniya-DBW/paths/~1api~1v3~1dbw~1orders~1status/post)\
        \ `confirm`.\n\nДоступны размеры:\n  - 580x400 px при `width=58&height=40`\
        \ в запросе\n  - 400x300 px при `width=40&height=30` в запросе\n\n<div class=\"\
        description_limit\">\n<a href=\"/openapi/api-information#tag/Vvedenie/Limity-zaprosov\"\
        >Лимит запросов</a> на один аккаунт продавца для следующих методов DBW:\n\
        <ul>\n    <li>получение и обновление списка контактов</li>\n    <li>получе\
