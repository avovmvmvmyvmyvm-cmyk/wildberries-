  /api/v1/content/author:
    get:
      description: |
        Метод позволяет получить список своего контента с использованием фильтрации.<br><br>

        **Описание параметров фильтрации**

        - `search` — Поиск контента по названию. Укажите часть или полное название контента для поиска.
        - `category` — Фильтрация контента по категории. Список категорий находится в [таблице](/openapi/wbd#tag/Kontent/Kategorii-kontenta), колонка — `catalog_id` — Идентифицировать категории.
        - `status` — Фильтрация контента по статусу. Возможные значения:
            - `0` — Создан
            - `1` — Загружено на сервер
            - `2` — Опубликован
            - `3` — Ошибка в обработке или публикации
            - `4` — Обрабатывается
            - `5` — Отправлено на сервер
        - `sort` — Сортировка контента по дате создания или обновления. Укажите `created` для сортировки по дате создания и `updated` для сортировки по дате обновления.
        - `sort_dir` — Направление сортировки. Укажите `asc` для сортировки по возрастанию или `desc` для сортировки по убыванию.
        - `skip` — Смещение. Позволяет пропустить определенное количество контента в результирующем наборе.<br>
        **Например**, если `skip` равно 20, то выборка начнется с 21 записи.
        - `take` — Количество контента, которое нужно вернуть в ответе.<br>
        **Например**, если `take` равно 10, то в ответе будет не более 10 записей.

        <div class="description_limit">
          Максимум 100 запросов в секунду
        </div>
      operationId: contentAuthorGet
      parameters:
      - description: Поиск по названию контента
        explode: true
        in: query
        name: search
        required: false
        schema:
          type: string
          x-nullable: false
        style: form
      - description: |
          Фильтрация по категории:
          - `1` — Видеоконтент
          - `2` — Аудиоконтент
          - `4` — Документ
        explode: true
        in: query
        name: category
        required: false
        schema:
          enum:
          - 1
          - 2
          - 4
          format: int64
          type: integer
          x-nullable: false
        style: form
      - description: |
          Фильтрация по статусу:
          - `0` — Создан
          - `1` — Загружено на сервер
          - `2` — Опубликован
          - `3` — Ошибка в обработке или публикации
          - `4` — Обрабатывается
          - `5` — Отправлено на сервер
        explode: true
        in: query
        name: status
        required: false
        schema:
          enum:
          - 0
          - 1
          - 2
          - 3
          - 4
          - 5
          format: int32
          type: integer
        style: form
        x-nullable: false
      - description: Сортировка контента по дате создания или обновления
        explode: true
        in: query
        name: sort
        required: false
        schema:
          enum:
          - created
          - updated
          type: string
        style: form
        x-nullable: false
      - description: |
          Направление сортировки:
          - `asc` — по возрастанию
          - `desc` — по убыванию
        explode: true
        in: query
        name: sort_dir
        required: false
        schema:
          enum:
          - asc
          - desc
          type: string
        style: form
        x-nullable: false
      - description: "Смещение. Количество контента, которые нужно пропустить в ре\
          зультирующем наборе."
        explode: true
        in: query
        name: skip
        required: false
        schema:
          default: 0
          format: int64
          type: integer
        style: form
        x-nullable: false
      - description: Количество контента для получения
        explode: true
        in: query
        name: take
        required: false
        schema:
          default: 50
          format: int64
          type: integer
        style: form
        x-nullable: false
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentList"
          description: Успешно
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails401"
          description: Не авторизован
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails500"
          description: Внутренняя ошибка
      security:
      - ApiKeyAuth: []
      summary: Получить список своего контента
      tags:
      - Контент
