  /api/v1/offers/author:
    get:
      description: |
        Метод позволяет получить список своих предложений с использованием фильтрации.<br><br>

        **Описание параметров фильтрации**

        - `search` — Поиск предложений по названию. Укажите часть или полное название предложения для поиска.
        - `category` — Фильтрация предложений по категории контента. Список категорий находится в [таблице](/openapi/wbd#tag/Kontent/Kategorii-kontenta).
        - `status` — Фильтрация предложений по статусу. Возможные значения:
            - `0` — Черновик
            - `1` — Опубликован
            - `2` — Приостановлен
        - `sort` — Сортировка предложений по дате создания или обновления. Укажите `created` для сортировки по дате создания и `updated` для сортировки по дате обновления.
        - `sort_dir` — Направление сортировки. Укажите `asc` для сортировки по возрастанию или `desc` для сортировки по убыванию.
        - `skip` — Смещение. Позволяет пропустить определенное количество предложений в результирующем наборе.<br>
        **Например**, если `skip` равно 20, то выборка начнется с 21 записи.
        - `take` — Количество предложений, которое нужно вернуть в ответе.<br>
        **Например**, если `take` равно 10, то в ответе будет не более 10 записей.

        <div class="description_limit">
          Максимум 100 запросов в секунду
        </div>
      operationId: offersAuthorGet
      parameters:
      - description: Поиск по названию предложения
        explode: true
        in: query
        name: search
        required: false
        schema:
          type: string
        style: form
        x-nullable: false
      - description: |
          Фильтрация по категории контента:
          - `1` — Видеоконтент
          - `2` — Аудиоконтент
          - `4` — Документ
        explode: true
        in: query
        name: category
        required: false
        schema:
          enum:
          - 1
          - 2
          - 4
          format: int64
          type: integer
        style: form
        x-nullable: false
      - description: |
          Фильтрация по статусу:
          - `0` — Черновик
          - `1` — Опубликован
          - `2` — Приостановлен
        explode: true
        in: query
        name: status
        required: false
        schema:
          enum:
          - 0
          - 1
          - 2
          format: int32
          type: integer
        style: form
        x-nullable: false
      - description: Сортировка предложений по дате создания или обновления
        explode: true
        in: query
        name: sort
        required: false
        schema:
          enum:
          - created
          - updated
          type: string
        style: form
        x-nullable: false
      - description: |
          Направление сортировки:
          - `asc` — по возрастанию
          - `desc` — по убыванию
        explode: true
        in: query
        name: sort_dir
        required: false
        schema:
          enum:
          - asc
          - desc
          type: string
        style: form
        x-nullable: false
      - description: "Смещение. Количество предложений, которые нужно пропустить в\
          \ результирующем наборе"
        explode: true
        in: query
        name: skip
        required: false
        schema:
          default: 0
          format: int64
          type: integer
        style: form
        x-nullable: false
      - description: Количество предложений для получения
        explode: true
        in: query
        name: take
        required: false
        schema:
          default: 50
          format: int64
          type: integer
        style: form
        x-nullable: false
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferResponseList"
          description: Успешно
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails400"
          description: Неправильный запрос
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails401"
          description: Не авторизован
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails500"
          description: Внутренняя ошибка
      security:
      - ApiKeyAuth: []
      summary: Получить список своих предложений
      tags:
      - Предложения
    servers:
    - url: https://devapi-digital.wildberries.ru
