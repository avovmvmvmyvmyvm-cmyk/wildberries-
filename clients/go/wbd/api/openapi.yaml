  /api/v1/catalog:
    get:
      description: |
        Метод позволяет получить дерево (структуру данных) с категориям и их подкатегориями.<br><br>

        **Иерархия структуры данных**<br><br>

        В нашей структуре есть три уровня иерархии:
        1. **Корневой узел** — сущность **Каталог**
        2. **Внешние узлы** представляют собой категории (`section`):
        - `1` — Видеоконтент
        - `2` — Аудиоконтент
        - `3` — Ключи активации
        - `4` — Электронные книги
        - `5` — Аудиокниги
        - `6` — Цифровые товары
        - `8` — Услуги
        - `12` — Купоны и развлечения
        - `13` — Подарочные сертификаты
        3. **Листья дерева** являются подкатегориями (`catalog_path`):
        - `65` — Обучающие видео
        - `66` — Спорт
        - `67` — Мастер-класс
        - `68` — Йога
        - `69` — Медитации

        <div class="description_limit">
          Максимум 100 запросов в секунду
        </div>
      operationId: GetCatalog
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetFullCatalogResponse"
          description: Успешно
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails401"
          description: Не авторизован
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails500"
          description: Внутренняя ошибка
      summary: Получить категории и их подкатегории
      tags:
      - Предложения
    servers:
    - url: https://devapi-digital.wildberries.ru
  /api/v1/content/illustration:
    post:
      description: |
        Метод позволяет загрузить обложку контента.

        <div class="description_important">
          Максимальный размер файла: 5 Мб<br>
          Допустимые форматы: PNG, JPEG<br>
          Рекомендации:
          <ul>
              <li>Соотношение сторон 1:1</li>
          </ul>
        </div>

        Краткая инструкция по применению:
        1. Убедитесь, что ваш файл соответствует указанным ограничениям и рекомендациям.
        2. Вызовите этот метод.
        3. При загрузке обложки вы получите список URI адресов для нового контента.
        4. Воспользуйтесь методом [Инициализировать новый контент](/openapi/wbd#tag/Kontent/operation/contentUploadInit) и передайте список URI адресов в поле `meta` в формате **JSON** используя следующий пример.

        **Пример:**

        ```json
        {
            "meta": {
                "thumbnail": [
                    "vol6/529/013cfs7f229183179aj53d2b3bbb839a/480.jpg",
                    "vol6/529/013cfs7f229183179aj53d2b3bbb839a/1280.jpg",
                    "vol6/529/013cfs7f229183179aj53d2b3bbb839a/1920.jpg"
                ]
            }
        }
        ```

        <div class="description_limit">
          Максимум 10 запросов в секунду
        </div>
      operationId: contentUploadIllustration
      parameters:
      - description: Тип файла
        explode: false
        in: header
        name: X-Content-Type
        required: true
        schema:
          enum:
          - image/png
          - image/jpeg
          type: string
        style: simple
        x-nullable: false
      requestBody:
        content:
          application/octet-stream:
            schema:
              description: Байты файла
              format: binary
              type: string
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IllustrationResponse"
          description: Успешно
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails400"
          description: Неправильный запрос
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails401"
          description: Не авторизован
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails500"
          description: Внутренняя ошибка
      security:
      - ApiKeyAuth: []
      summary: Загрузить обложку контента
      tags:
      - Контент
    servers:
    - url: https://devapi-digital.wildberries.ru
  /api/v1/content/upload/init:
    post:
      description: |
        Метод позволяет инициализировать (загрузить) информацию нового контента.<br><br>

        Типы контента и требования к ним вы можете посмотреть в оглавлении [Работа с контентом](/openapi/wbd#tag/Kontent).<br><br>

        Подготовка файла к последующей загрузке:
        - Вам необходимо разбить файл на части (фреймы) не более 2 Мб.
        - Передать размер (в байтах) каждой части и порядковый номер в параметре `parts`.

        **Пример:**<br>
        Файл размером 5 Мб, нужно разбить на 3 части — 2 Мб, 2 Мб и 1 Мб.
        ```json
        {
            "parts": [
                {
                  "index": 1,
                  "size": 2097152
                },
                {
                  "index": 2,
                  "size": 2097152
                },
                {
                  "index": 3,
                  "size": 1048576
                }
            ],
        }
        ```

        В методе [Загрузить контент (файл)](/openapi/wbd#tag/Kontent/operation/contentUploadChunk) вам нужно будет загрузить 3 части файла с указанием их порядкового номера через `X-Wbd-Part-Index`.<br><br>

        **Обязательные поля в метаданных (`meta`) для загрузки контента**<br><br>

        Общие поля:
        - `thumbnail`
        - `rating`

        Аудиоконтент:
        - `author`

        Документ:
        - `author`
        - `pages`

        Краткая инструкция по применению:
        1. Подготовьте метаданные и информацию о вашем контенте.
        2. Убедитесь, что ваш контент соответствует [требованиям](/openapi/wbd#tag/Kontent/Trebovaniya-k-kontentu) (формат и размер файла).
        3. Вызовите этот метод для инициализации нового контента.
        4. В ответе вы получите `uuid` контента, необходимый для последующей загрузки самого файла.
        5. Используйте метод [Загрузить файл контента](/openapi/wbd#tag/Kontent/operation/contentUploadChunk), чтобы загрузить файл.

        <div class="description_limit">
          Максимум 10 запросов в секунду
        </div>
      operationId: contentUploadInit
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadInitRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadInitResponse"
          description: Успешно
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails400"
          description: Неправильный запрос
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails401"
          description: Не авторизован
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails500"
          description: Внутренняя ошибка
      security:
      - ApiKeyAuth: []
      summary: Инициализировать новый контент
      tags:
      - Контент
    servers:
    - url: https://devapi-digital.wildberries.ru
  /api/v1/content/upload/chunk:
    post:
      description: |
        Метод позволяет загрузить контент (файл) по частям.<br><br>

        Краткая инструкция по применению:
        1. Разбейте файл на части размером не более 2 Мб.
        2. Для каждой части файла:
          - Убедитесь, что заголовок `X-Content-Type` соответствует типу вашего контента (например, `video/mp4`, `audio/mpeg`, `application/pdf` и т.д.).
          - Установите заголовок `X-Wbd-Part-Index` в соответствии с индексом текущей части (начиная с 1).
          - Укажите `uuid` контента в заголовке `X-Wbd-Content-Uuid`, который вы получили при [инициализации нового контента](/openapi/wbd#tag/Kontent/operation/contentUploadInit).
          - Отправьте байты (часть файла) в теле запроса.
        3. Повторяйте шаг 2 для всех частей файла до завершения загрузки.

        <div class="description_limit">
          Максимум 10 запросов в секунду
        </div>
      operationId: contentUploadChunk
      parameters:
      - description: Тип файла
        explode: false
        in: header
        name: X-Content-Type
        required: true
        schema:
          enum:
          - video/mp4
          - audio/mpeg
          - text/plain
          - application/pdf
          - application/zip
          - application/epub+zip
          type: string
        style: simple
        x-nullable: false
      - description: Индекс фрейма (части контента)
        explode: false
        in: header
        name: X-Wbd-Part-Index
        required: true
        schema:
          format: int64
          type: integer
        style: simple
        x-nullable: false
      - description: "Уникальный ID полученный в [инициализации нового контента](./wbd#tag/Kontent/operation/contentUploadInit)"
        explode: false
        in: header
        name: X-Wbd-Content-Uuid
        required: true
        schema:
          type: string
        style: simple
        x-nullable: false
      requestBody:
        content:
          application/octet-stream:
            schema:
              description: Байты файла
              format: binary
              type: string
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadChunkResponse"
          description: Успешно
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails400"
          description: Неправильный запрос
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails401"
          description: Не авторизован
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails500"
          description: Внутренняя ошибка
      security:
      - ApiKeyAuth: []
      summary: Загрузить контент (файл)
      tags:
      - Контент
    servers:
    - url: https://devapi-digital.wildberries.ru
