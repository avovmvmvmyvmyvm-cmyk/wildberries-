  /api/v1/content/gallery:
    post:
      description: |
        Метод позволяет загружать медиафайлы на сервер.<br><br>

        После успешной загрузки возвращает список URI-адресов, которые можно использовать для добавления дополнительных медиафайлов в предложение.<br><br>

        Данный метод поможет вам добавить дополнительные медиафайлы при создании или обновлении предложения.
        - [Создать новое предложение](/openapi/wbd#tag/Predlozheniya/operation/offerCreate)
        - [Редактировать предложение](/openapi/wbd#tag/Predlozheniya/operation/offerUpdate)

        <div class="description_important">
          Ограничения по размеру:
          <ul>
              <li>изображение: <b>5 Мб</b></li>
              <li>видео: <b>50 Мб</b></li>
              <li>общий размер всех файлов: <b>100 Мб</b></li>
          </ul>
          Допустимые форматы:
          <ul>
              <li>изображение: <b>PNG, JPEG</b></li>
              <li>видео: <b>MP4</b></li>
          </ul>
          Можно передать <b>до 8 медиафайлов</b>.
        </div>

        <div class="description_limit">
          Максимум 10 запросов в секунду
        </div>
      operationId: contentGallery
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/contentGallery_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadGalleryResponse"
          description: Успешно
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails400"
          description: Неправильный запрос
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails401"
          description: Не авторизован
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails500"
          description: Внутренняя ошибка
      summary: Загрузить медиафайлы для предложения
      tags:
      - Контент
    servers:
    - url: https://devapi-digital.wildberries.ru
