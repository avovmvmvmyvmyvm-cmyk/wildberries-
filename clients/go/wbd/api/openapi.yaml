openapi: 3.0.1
info:
  description: |
    По вопросам работы с WBD API обращайтесь в <a href="https://digital.wildberries.ru/support" target="_blank">техническую поддержку</a>
  title: Wildberries Цифровой
  version: wbd
  x-file-name: wbd
servers:
- url: /
security:
- ApiKeyAuth: []
tags:
- description: ""
  name: Введение WBD
- description: ""
  name: Авторизация WBD
- description: ""
  name: Предложения
- description: ""
  name: Контент
- description: ""
  name: Ключи активации
paths:
  /api/v1/keys-api/keys:
    delete:
      description: |
        Метод позволяет удалить ключи активации по их ID.

        <div class="description_important">
          Доступ к методу предоставляется через заявку в <a href="https://digital.wildberries.ru/support" target="_black">техническую поддержку</a>.
        </div>

        <div class="description_limit">
            Максимум 100 запросов в секунду
        </div>
      operationId: DeleteKeysByIDs
      parameters:
      - description: Список ID ключей
        explode: true
        in: query
        name: ids
        required: true
        schema:
          items:
            format: int64
            type: integer
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                statuses:
                - id: 12345
                  code: "200"
                  message: ok
                  status: true
                - id: 12346
                  code: "200"
                  message: ok
                  status: true
              schema:
                $ref: "#/components/schemas/KeysDeleteResponse"
          description: Успешно
        "207":
          content:
            application/json:
              example:
                statuses:
                - id: 42
                  code: "200"
                  message: ok
                  status: true
                - id: 58
                  code: "409"
                  message: Ключ уже был продан.
                  status: false
                - id: 59
                  code: "409"
                  message: Ключ уже был зарезервирован.
                  status: false
                - id: 78
                  code: "200"
                  message: Ключ уже был удален.
                  status: true
              schema:
                $ref: "#/components/schemas/KeysDeleteResponse"
          description: Не получилось удалить некоторые ключи
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails400"
          description: Неправильный запрос
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails401"
          description: Не авторизован
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails403"
          description: Доступ запрещён
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails404"
          description: Не найдено
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails500"
          description: Внутренняя ошибка
      security:
      - ApiKeyAuth: []
      summary: Удалить ключи активации
      tags:
      - Ключи активации
    post:
      description: |
        Метод позволяет добавить ключи для предложения по ID.

        <div class="description_important">
          Предложение должно быть из категории (<code>section</code>):
          <ul>
              <li>Ключи активации — <code>3</code></li>
              <li>Купоны и развлечения — <code>12</code></li>
              <li>Подарочные сертификаты — <code>13</code></li>
          </ul>
        </div>

        <div class="description_limit">
          Максимум 50 запросов в секунду
        </div>
      operationId: LoadKeys
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KeysLoadRequest"
        required: true
      responses:
        "200":
          description: Успешно
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails401"
          description: Не авторизован
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails403"
          description: Доступ запрещён
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails404"
          description: Не найдено
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails500"
          description: Внутренняя ошибка
      security:
      - ApiKeyAuth: []
      summary: Добавить ключи активации
      tags:
      - Ключи активации
    servers:
    - url: https://devapi-digital.wildberries.ru
  /api/v1/keys-api/keys/redeemed:
    get:
      description: |
        Метод позволяет получить список купленных ключей с использованием фильтрации.<br><br>

        **Описание параметров фильтрации**

        - `offer_id` — Фильтрация по ID предложения. Позволяет выбрать ключи, связанные с определенным предложением.
        - `skip` — Смещение. Указывает, сколько записей нужно пропустить в результирующем наборе.<br>
        **Например**, если `skip` равно 20, то выборка начнется с 21 записи.
        - `take` — Количество записей для получения. Указывает, сколько ключей должно быть возвращено в ответе.<br>
        **Например**, если `take` равно 10, то в ответе будет не более 10 записей.
        - `date_from` — Фильтрация по дате покупки начиная с указанной даты (включительно).<br> Формат даты: **RFC3339**.
        - `date_to` — Фильтрация по дате покупки до указанной даты (не включительно).<br>
        Формат даты: **RFC3339**.

        <div class="description_limit">
          Максимум 100 запросов в секунду
        </div>
      operationId: GetRedeemedKeys
      parameters:
      - description: "Фильтрация по ID предложения. Позволяет выбрать ключи, связа\
          нные с определенным предложением"
        explode: true
        in: query
        name: offer_id
        required: false
        schema:
          format: int64
          type: integer
          x-nullable: false
        style: form
      - description: "Смещение. Указывает, сколько записей нужно пропустить в резу\
          льтирующем наборе. Используется для пагинации"
        explode: true
        in: query
        name: skip
        required: false
        schema:
          default: 0
          format: int64
          type: integer
        style: form
        x-nullable: false
      - description: "Количество записей для получения. Указывает, сколько ключей\
          \ должно быть возвращено в ответе"
        explode: true
        in: query
        name: take
        required: false
        schema:
          default: 50
          format: int64
          type: integer
        style: form
        x-nullable: false
      - description: |
          Фильтрация по дате покупки начиная с указанной даты (включительно).<br><br>

          Формат даты: **RFC3339** (`2023-06-17T19:20:30Z`)
        explode: true
        in: query
        name: date_from
        required: false
        schema:
          type: string
          x-nullable: false
        style: form
      - description: |
          Фильтрация по дате покупки до указанной даты (не включительно).

          Формат даты: **RFC3339** (`2024-10-18T19:20:30Z`)
        explode: true
        in: query
        name: date_to
        required: false
        schema:
          type: string
          x-nullable: false
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeysRedeemedResponseList"
          description: Успешно
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails401"
          description: Не авторизован
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails500"
          description: Внутренняя ошибка
      security:
      - ApiKeyAuth: []
      summary: Получить купленные ключи
      tags:
      - Ключи активации
    servers:
    - url: https://devapi-digital.wildberries.ru
  /api/v1/offer/keys/{offer_id}:
    get:
      description: |
        Метод позволяет получить информацию о количестве ключей у конкретного предложения.

        <div class="description_limit">
          Максимум 100 запросов в секунду
        </div>
      operationId: offerKeysCountGet
      parameters:
      - description: ID предложения
        explode: false
        in: path
        name: offer_id
        required: true
        schema:
          format: int64
          type: integer
          x-nullable: false
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeysCountResponse"
          description: Успешно
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails401"
          description: Не авторизован
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails404"
          description: Не найдено
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails500"
          description: Внутренняя ошибка
      security:
      - ApiKeyAuth: []
      summary: Получить количество ключей для предложения
      tags:
      - Ключи активации
    servers:
    - url: https://devapi-digital.wildberries.ru
  /api/v1/offer/keys/{offer_id}/list:
    get:
      description: |
        Метод позволяет получить список загруженных вами ключей для конкретного предложения.

        <div class="description_important">
          Доступ к методу предоставляется через заявку в <a href="https://digital.wildberries.ru/support" target="_black">техническую поддержку</a>.
        </div>

        <div class="description_limit">
          Максимум 100 запросов в секунду
        </div>
      operationId: offerKeysGet
      parameters:
      - description: ID предложения
        explode: false
        in: path
        name: offer_id
        required: true
        schema:
          format: int64
          type: integer
          x-nullable: false
        style: simple
      - description: "Количество записей для получения. Указывает, сколько ключей\
          \ должно быть возвращено в ответе"
        explode: true
        in: query
        name: take
        required: false
        schema:
          default: 50
          format: uint32
          type: integer
          x-nullable: false
        style: form
      - description: "Смещение. Указывает, сколько записей нужно пропустить в резу\
          льтирующем наборе. Используется для пагинации"
        explode: true
        in: query
        name: skip
        required: false
        schema:
          default: 0
          format: uint32
          type: integer
          x-nullable: false
        style: form
      - description: "Указывает, будут ли в ответе присутствовать удалённые ключи"
        explode: true
        in: query
        name: deleted
        required: false
        schema:
          default: true
          type: boolean
          x-nullable: false
        style: form
      - description: "Указывает, будут ли в ответе присутствовать проданные ключи"
        explode: true
        in: query
        name: sold
        required: false
        schema:
          default: true
          type: boolean
          x-nullable: false
        style: form
      - description: "Указывает, будут ли в ответе присутствовать зарезервированны\
          е ключи"
        explode: true
        in: query
        name: reserved
        required: false
        schema:
          default: true
          type: boolean
          x-nullable: false
        style: form
      - description: "Указывает, будут ли в ответе присутствовать ключи с истекшим\
          \ сроком действия"
        explode: true
        in: query
        name: expired
        required: false
        schema:
          default: true
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeysResponseList"
          description: Успешно
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails400"
          description: Неправильный запрос
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails401"
          description: Не авторизован
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails403"
          description: Доступ запрещён
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails404"
          description: Не найдено
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails500"
          description: Внутренняя ошибка
      security:
      - ApiKeyAuth: []
      summary: Получить список ключей
      tags:
      - Ключи активации
    servers:
    - url: https://devapi-digital.wildberries.ru
  /api/v1/offers:
    post:
      description: |
        Метод позволяет создать новое предложение.<br><br>

        **Обязательные поля**
        - `title` — Название предложения
        - `description` — Описание предложения
        - `tags` — Теги предложения
        - `section` — Категория предложения
        - `catalog_path` — Подкатегория предложения
        - `age_rating` — Возрастное ограничение предложения
        - `price` — Цена предложения

        **Добавить обложку**<br><br>

        Обложка для предложения загружается **отдельно после создания предложения**.<br>
        Вам необходимо воспользоваться методом [Добавить или обновить обложку предложения](/openapi/wbd#tag/Predlozheniya/operation/offersUploadThumbnail).<br><br>

        **Добавить дополнительные медиафайлы**

        1. Загрузить медиафайлы с помощью метода [Загрузить медиафайл для предложения](/openapi/wbd#tag/Kontent/operation/contentGallery), метод возвращает список URI адресов загруженных медиафайлов.
        2. Добавить URI медиафайлов в поле `gallery`.

        **Категория и подкатегория предложения**<br><br>

        Воспользуйтесь методом [Получить категории и их подкатегории](/openapi/wbd#tag/Predlozheniya/operation/GetCatalog) для получения ID подкатегории и правильного сопоставления с категорией.<br><br>

        **Предложение из категории "Услуги"**<br><br>

        `section` — `8`<br><br>

        Доступ к публикации контента этой категории предоставляется через заявку в <a href="https://digital.wildberries.ru/support" target="_blank">техническую поддержку</a>.<br><br>

        **Предложение c уникальными ключами**<br><br>

        Предложение c уникальными ключами относятся к категориям (`section`):
        - **Ключи активации** — `3`
        - **Купоны и развлечения** — `12`
        - **Подарочные сертификаты** — `13`

        Обязательные данные:
        - Ключи к предложению
        - Инструкция по активации ключа

        **Загрузка ключей**<br><br>
        Список ключей передается в параметре `keys` вашего запроса при создании предложения.<br>
        В дальнейшем вы можете добавлять ключи с помощью метода [Добавить ключи активации](/openapi/wbd#tag/Klyuchi-aktivacii/operation/LoadKeys).<br><br>

        **Добавление инструкции по активации ключа**<br><br>

        Инструкцию по активации ключа необходимо добавить в поле `meta` в формате **JSON** используя следующий пример.<br>
        Чтобы сделать текст более привлекательным и удобочитаемым, **используйте перенос строки** `\n`.<br><br>

        **Пример:**

        ```json
        {
            "meta":{
                "key_instruction": "Инструкция по активации\n1. Зайдите на сайт ...\n2.Вставьте ключ в поле ..."
            }
        }
        ```

        **Предложение с контентом**<br><br>

        Предложение с контентом относится к категориям (`section`):
        - **Видеоконтент** — `1`
        - **Аудиоконтент** — `2`
        - **Электронные книги** — `4`
        - **Аудиокниги** — `5`
        - **Цифровые товары** — `6`

        Обязательные данные:
        - Контент для предложения

        **Добавление контента**<br><br>

        Если вы ещё не добавили контент в личный кабинет продавца, то вы можете это сделать по [инструкции](/openapi/wbd#tag/Kontent/Kak-dobavit-novyj-kontent).<br><br>

        Для добавления контента вам необходимо передать в параметре `content` список данных используя пример ниже.<br><br>

        **Пример:**

        ```json
        "content": [
            {
                "category_id": 1,
                "content": 8942
            },
            {
                "category_id": 1,
                "content": 4211
            }
        ]
        ```

        где:
        - `category_id` — ID категории контента
        - `content` — ID контента

        Эту информацию вы можете получить с помощью метод [Получить список своего контента](/openapi/wbd#tag/Kontent/operation/contentAuthorGet).

        <div class="description_limit">
          Максимум 50 запросов в секунду
        </div>
      operationId: offerCreate
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfferCreateRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferResponse"
          description: Успешно
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails400"
          description: Неправильный запрос
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails401"
          description: Не авторизован
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails500"
          description: Внутренняя ошибка
      security:
      - ApiKeyAuth: []
      summary: Создать новое предложение
      tags:
      - Предложения
    servers:
    - url: https://devapi-digital.wildberries.ru
  /api/v1/offers/thumb:
    post:
      description: |
        Метод позволяет добавить или обновить обложку предложения.<br>
        Для добавления более привлекательной карточки предложения, мы рекомендуем:

          1. Добавлять изображения с соотношением сторон 1:1.
          2. Минимальный размер изображения 1200х1200 пикселей.
          3. Фон контрастный белому.

        <div class="description_important">
          Максимальный размер файла: 5 Мб<br>
          Допустимые форматы: PNG, JPEG
        </div>

        <div class="description_limit">
          Максимум 10 запросов в секунду
        </div>
      operationId: offersUploadThumbnail
      parameters:
      - description: Тип изображения
        explode: false
        in: header
        name: X-Content-Type
        required: true
        schema:
          enum:
          - image/jpeg
          - image/png
          type: string
        style: simple
        x-nullable: false
      - description: ID предложения
        explode: false
        in: header
        name: X-Wbd-OfferId
        required: true
        schema:
          format: int64
          type: integer
        style: simple
        x-nullable: false
      requestBody:
        content:
          application/octet-stream:
            schema:
              description: Байты файла
              format: binary
              type: string
        required: true
      responses:
        "200":
          description: Успешно
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails400"
          description: Неправильный запрос
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails401"
          description: Не авторизован
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails500"
          description: Внутренняя ошибка
      security:
      - ApiKeyAuth: []
      summary: Добавить или обновить обложку предложения
      tags:
      - Предложения
    servers:
    - url: https://devapi-digital.wildberries.ru
  /api/v1/offers/{offer_id}:
    get:
      description: |
        Метод позволяет получить информацию о конкретном предложении.

        <div class="description_limit">
          Максимум 100 запросов в секунду
        </div>
      operationId: offerGet
      parameters:
      - description: ID предложения
        explode: false
        in: path
        name: offer_id
        required: true
        schema:
          format: int64
          type: integer
        style: simple
        x-nullable: false
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfferResponse"
          description: Успешно
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails400"
          description: Неправильный запрос
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails401"
          description: Не авторизован
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails404"
          description: Не найдено
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails500"
          description: Внутренняя ошибка
      security:
      - ApiKeyAuth: []
      summary: Получить информацию о предложении
      tags:
      - Предложения
