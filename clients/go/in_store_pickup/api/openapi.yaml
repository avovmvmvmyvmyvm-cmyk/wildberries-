        warehouseId: 6
        price: 5
        orderCode: orderCode
        convertedCurrencyCode: 643
        id: 0
        chrtId: 5
        currencyCode: 643
      properties:
        ddate:
          description: Планируемая дата доставки
          type: string
        salePrice:
          description: |
            Цена продавца в валюте продажи с учётом скидки продавца, без учёта скидки WB Клуба, умноженная на 100. Предоставляется в информационных целях
          example: 504600
          nullable: true
          type: integer
        requiredMeta:
          description: |
            Список метаданных, доступных для сборочного задания
          items:
            type: string
          nullable: true
          type: array
        article:
          description: Артикул продавца
          type: string
        rid:
          description: |
            Уникальный ID заказа. <br>
            Примечание: поле `rid` — это поле `srid` в ответах методов:
              - [Заявки покупателей на возврат](./user-communication#tag/Vozvraty-pokupatelyami/paths/~1api~1v1~1claims/get)
              - [Заказы](./reports#tag/Osnovnye-otchyoty/paths/~1api~1v1~1supplier~1orders/get)
              - [Продажи](./reports#tag/Osnovnye-otchyoty/paths/~1api~1v1~1supplier~1sales/get)
              - [Отчет о возвратах и перемещении товаров](./reports#tag/Otchyot-o-vozvratah-i-peremeshenii-tovarov)
              - [Отчет о продажах по реализации](./financial-reports-and-accounting#tag/Finansovye-otchyoty/paths/~1api~1v5~1supplier~1reportDetailByPeriod/get)
          type: string
        createdAt:
          description: Дата и время создания сборочного задания
          format: date-time
          type: string
        warehouseAddress:
          description: |
            Адрес магазина (склада продавца), на который поступило сборочное
            задание
          type: string
        orderCode:
          description: |
            Уникальный ID заказа покупателя
          type: string
        payMode:
          description: |
            Режим оплаты:
              - `prepaid` — предоплатный
              - `postpaid` — постоплатный
              - `unknown` — неизвестный
          example: prepaid
          type: string
        skus:
          description: Массив баркодов товара
          items:
            type: string
          type: array
        id:
          description: ID сборочного задания
          type: integer
        warehouseId:
          description: |
            ID склада продавца, на который поступило сборочное
            задание
          type: integer
        nmId:
          description: Артикул WB
          type: integer
        chrtId:
          description: ID размера товара в системе WB
          type: integer
        price:
          description: |
            Цена в валюте продажи с учетом всех скидок, кроме скидки по WB Кошельку, умноженная на 100.
            Код валюты продажи указан в поле `currencyCode`. Предоставляется в информационных целях
          type: integer
