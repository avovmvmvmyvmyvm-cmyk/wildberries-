    post:
      description: "Метод возвращает статусы [сборочных заданий](/openapi/in-store-pickup#tag/Sborochnye-zadaniya-Samovyvoz)\
        \ по их ID.\n<br><br>\n`supplierStatus` — статус сборочного задания. Тригг\
        ер его изменения - действие самого продавца.\n\nВозможные значения `supplierStatus`:\n\
        | Статус   | Описание            | Как перевести сборочное задание в данны\
        й статус |\n| -------  | ---------           | --------------------------------------|\n\
        | `new`      | **Новое сборочное задание** |\n| `confirm`  | **На сборке**\
        \  | \t[Перевести сборочное задание на сборку](/openapi/in-store-pickup#tag/Sborochnye-zadaniya-Samovyvoz/paths/~1api~1marketplace~1v3~1click-collect~1orders~1status~1confirm/post)\n\
        | `prepare`  | **Готов к выдаче** | \t[Сообщить, что сборочное задание гот\
        ово к выдаче](/openapi/in-store-pickup#tag/Sborochnye-zadaniya-Samovyvoz/paths/~1api~1marketplace~1v3~1click-collect~1orders~1status~1prepare/post)\n\
        | `receive`  | **Получено покупателем**   | [Сообщить, что заказ принят по\
        купателем](/openapi/in-store-pickup#tag/Sborochnye-zadaniya-Samovyvoz/paths/~1api~1marketplace~1v3~1click-collect~1orders~1status~1receive/post)\n\
        | `reject`  | **Отказ покупателя при получении**    |  \t[Сообщить, что по\
        купатель отказался от заказа](/openapi/in-store-pickup#tag/Sborochnye-zadaniya-Samovyvoz/paths/~1api~1marketplace~1v3~1click-collect~1orders~1status~1reject/post)\n\
        | `cancel`   | **Отменено продавцом**    |  \t[Отменить сборочное задание\
        ](/openapi/in-store-pickup#tag/Sborochnye-zadaniya-Samovyvoz/paths/~1api~1marketplace~1v3~1click-collect~1orders~1status~1cancel/post)\n\
        | `cancel_shelf_life` | **Отмена по истечении срока хранения**    |  \tПер\
        еводится автоматически по возникновению события\n\n<br><br>\n`wbStatus` —\
        \ статус системы Wildberries.\n\nВозможные значения `wbStatus`:\n- `waiting`\
        \ - сборочное задание в работе\n- `sold` - заказ получен покупателем\n- `canceled`\
        \ - отмена сборочного задания\n- `canceled_by_client` - покупатель отменил\
        \ заказ при получении\n- `declined_by_client` - покупатель отменил заказ в\
        \ первый чаc\n<br> Отмена доступна покупателю в первый час с момента заказ\
        а, если заказ не переведён на сборку\n- `defect` - отмена заказа по причин\
        е брака\n- `ready_for_pickup` - заказ готов к выдаче\n\n<div class=\"description_limit\"\
        >\n<a href=\"/openapi/api-information#tag/Vvedenie/Limity-zaprosov\">Лимит\
        \ запросов</a> на один аккаунт продавца:\n\n| Период | Лимит | Интервал |\
