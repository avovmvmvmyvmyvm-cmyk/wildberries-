        nmId: 1
        finalPrice: 5000
        requiredMeta:
        - requiredMeta
        - requiredMeta
        rid: rid
        article: article
        convertedFinalPrice: 5000
        createdAt: 2000-01-23T04:56:07.000+00:00
        convertedPrice: 5000
