      x-readonly-method: true
      x-category: documents
    servers:
    - url: https://documents-api.wildberries.ru
  /api/v1/documents/list:
    get:
      description: |
        Метод возвращает список документов продавца. Вы можете получить [один](/openapi/financial-reports-and-accounting#tag/Dokumenty/paths/~1api~1v1~1documents~1download/get) или [несколько](/openapi/financial-reports-and-accounting#tag/Dokumenty/paths/~1api~1v1~1documents~1download~1all/post) документов из полученного списка.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:

        | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- |
        | 10 сек | 1 запрос | 10 сек | 5 запросов |
        </div>
      parameters:
      - description: |
          Язык поля `category`:
            - `ru` — русский
            - `en` — английский
            - `zh` — китайский
        explode: true
        in: query
        name: locale
        required: false
        schema:
          default: en
          example: ru
          type: string
        style: form
      - description: Начало периода. Только вместе с `endTime`
        explode: true
        in: query
        name: beginTime
        required: false
        schema:
          example: 2024-07-09
          format: date
          type: string
        style: form
      - description: Конец периода. Только вместе с `beginTime`
        explode: true
        in: query
        name: endTime
        required: false
        schema:
          example: 2024-07-15
          format: date
          type: string
        style: form
      - description: |
          Сортировка:
            - `date` — по дате создания документа
            - `category` — по категории (только при `locale=ru`)

          Только вместе с `order`
        explode: true
        in: query
        name: sort
        required: false
        schema:
          default: date
          enum:
          - date
          - category
          example: category
          type: string
        style: form
      - description: |
          Сортировка:
            - `desc` — по убыванию
            - `asc` — по возрастанию

          Только вместе с `sort`
        explode: true
        in: query
        name: order
        required: false
        schema:
          default: desc
          enum:
          - desc
          - asc
          example: asc
          type: string
        style: form
      - description: "ID [категории документов](./financial-reports-and-accounting#tag/Dokumenty/paths/~1api~1v1~1documents~1categories/get)\
          \ из поля `name`"
        explode: true
        in: query
        name: category
        required: false
        schema:
          example: redeem-notification
          type: string
        style: form
      - description: Уникальный ID документа
        explode: true
        in: query
        name: serviceName
        required: false
        schema:
          example: redeem-notification-44841941
          type: string
        style: form
      - description: Максимальное количество строк ответа
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          example: 10
          maximum: 50
          type: integer
        style: form
      - description: После какой строки выдавать данные
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          example: 90
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetList"
          description: Успешно
        "400":
          content:
            application/json:
              examples:
                BadSort&Orders:
                  description: Параметры sort и order нельзя указывать по отдельности
                  value:
                    title: Bad Request
                    status: 400
                    detail: sort and order must be both set or both not set
                    requestId: 41fc3b08-051d-4871-9991-6502977912ad
                    origin: docs-public-api
                BadLimit:
                  description: Превышено допустимое значение параметра limit
                  value:
                    title: Bad Request
                    status: 400
                    detail: limit must be less than or equal to 50
                    requestId: 46ce9c17-4b74-46ed-abb1-e40d2b0d52ce
                    origin: docs-public-api
              schema:
                $ref: "#/components/schemas/_api_v1_documents_list_get_400_response"
          description: Неправильный запрос
        "401":
          content:
            application/problem+json:
              example:
                title: unauthorized
                detail: "token problem; token is malformed: could not base64 decode\
                  \ signature: illegal base64 data at input byte 84"
                code: "07e4668e--a53a3d31f8b0-[UK-oWaVDUqNrKG]; 03bce=277; 84bd353bf-75"
                requestId: 7b80742415072fe8b6b7f7761f1d1211
                origin: s2s-api-auth-catalog
                status: 401
                statusText: Unauthorized
                timestamp: 2024-09-30T06:52:38Z
              schema:
                $ref: "#/components/schemas/_api_v1_account_balance_get_401_response"
          description: Не авторизован
        "402":
          content:
            application/problem+json:
              example:
                title: payment required
                detail: "please top up your balance in your company personal account\
                  \ https://dev.{{ .baseDomain }}/company"
              schema:
                $ref: "#/components/schemas/_api_v1_account_balance_get_402_response"
          description: Требуется платёж
        "429":
          content:
            application/problem+json:
              example:
                title: too many requests
                detail: limited by c122a060-a7fb-4bb4-abb0-32fd4e18d489
                code: "07e4668e-ac2242c5c8c5-[UK-4dx7JUdskGZ]"
                requestId: 9d3c02cc698f8b041c661a7c28bed293
                origin: s2s-api-auth-catalog
                status: 429
                statusText: Too Many Requests
                timestamp: 2024-09-30T06:52:38Z
              schema:
                $ref: "#/components/schemas/_api_v1_account_balance_get_401_response"
          description: Слишком много запросов
      security:
      - HeaderApiKey: []
      summary: Список документов
      tags:
      - Документы
      x-readonly-method: true
      x-category: documents
    servers:
    - url: https://documents-api.wildberries.ru
