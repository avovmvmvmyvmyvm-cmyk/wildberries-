      - description: Уникальный ID документа
        explode: true
        in: query
        name: serviceName
        required: false
        schema:
          example: redeem-notification-44841941
          type: string
        style: form
      - description: Максимальное количество строк ответа
        explode: true
        in: query
        name: limit
        required: false
