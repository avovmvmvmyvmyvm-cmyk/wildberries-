openapi: 3.0.1
info:
  description: |
    <div class="description_important">
      Узнать больше о документах и бухгалтерии можно в <a href="https://seller.wildberries.ru/instructions/category/ba929b64-1f89-4426-82d7-ce998ee552bd?goBackOption=prevRoute&categoryId=3c971375-9939-45e8-ab82-376019be8942">справочном центре</a>
    </div>

    Просмотр [баланса](/openapi/financial-reports-and-accounting#tag/Balans), [финансовых отчётов](/openapi/financial-reports-and-accounting#tag/Finansovye-otchyoty) и [документов](/openapi/financial-reports-and-accounting#tag/Dokumenty) продавца.
  title: Документы и бухгалтерия
  version: finances
  x-file-name: finances
servers:
- url: /
security:
- HeaderApiKey: []
tags:
- description: ""
  name: Баланс
- description: ""
  name: Финансовые отчёты
- description: ""
  name: Документы
paths:
  /api/v1/account/balance:
    get:
      description: |
        Метод возвращает данные виджета баланса на [главной странице](https://seller.wildberries.ru) портала продавцов.
        <br><br>

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:

        | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- |
        | 1 мин | 1 запрос | 1 мин | 1 запрос |
        </div>
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_api_v1_account_balance_get_200_response"
          description: Успешно
        "401":
          content:
            application/problem+json:
              example:
                title: unauthorized
                detail: "token problem; token is malformed: could not base64 decode\
                  \ signature: illegal base64 data at input byte 84"
                code: "07e4668e--a53a3d31f8b0-[UK-oWaVDUqNrKG]; 03bce=277; 84bd353bf-75"
                requestId: 7b80742415072fe8b6b7f7761f1d1211
                origin: s2s-api-auth-catalog
                status: 401
                statusText: Unauthorized
                timestamp: 2024-09-30T06:52:38Z
              schema:
                $ref: "#/components/schemas/_api_v1_account_balance_get_401_response"
          description: Не авторизован
        "402":
          content:
            application/problem+json:
              example:
                title: payment required
                detail: "please top up your balance in your company personal account\
                  \ https://dev.{{ .baseDomain }}/company"
              schema:
                $ref: "#/components/schemas/_api_v1_account_balance_get_402_response"
          description: Требуется платёж
        "429":
          content:
            application/problem+json:
              example:
                title: too many requests
                detail: limited by c122a060-a7fb-4bb4-abb0-32fd4e18d489
                code: "07e4668e-ac2242c5c8c5-[UK-4dx7JUdskGZ]"
                requestId: 9d3c02cc698f8b041c661a7c28bed293
                origin: s2s-api-auth-catalog
                status: 429
                statusText: Too Many Requests
                timestamp: 2024-09-30T06:52:38Z
              schema:
                $ref: "#/components/schemas/_api_v1_account_balance_get_401_response"
          description: Слишком много запросов
      security:
      - HeaderApiKey: []
      summary: Получить баланс продавца
      tags:
      - Баланс
      x-readonly-method: true
      x-category: finance
    servers:
    - url: https://finance-api.wildberries.ru
  /api/v5/supplier/reportDetailByPeriod:
    get:
      description: |
        Метод возвращает детализации к [отчётам реализации](https://seller.wildberries.ru/suppliers-mutual-settlements).
        <br><br>
        Данные доступны с 29 января 2024 года.

        <div class="description_important">
          Вы можете выгрузить данные в <a href="https://dev.wildberries.ru/ru/cases/1">Google Таблицы</a>
        </div>

        <div class="description_limit">
          <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:

          | Период | Лимит | Интервал | Всплеск |
          | --- | --- | --- | --- |
          | 1 минута | 1 запрос | 1 минута | 1 запрос |
        </div>
      parameters:
      - description: |
          Начальная дата отчёта.<br>
          Дата в формате RFC3339. Можно передать дату или дату со временем.
          Время можно указывать с точностью до секунд или миллисекунд. <br>
          Время передаётся в часовом поясе Москва (UTC+3).
          <br>Примеры:
            - `2019-06-20`
            - `2019-06-20T23:59:59`
            - `2019-06-20T00:00:00.12345`
            - `2017-03-25T00:00:00`
        explode: true
        in: query
        name: dateFrom
        required: true
        schema:
          format: date-time
          type: string
        style: form
      - description: Конечная дата отчёта
        explode: true
        in: query
        name: dateTo
        required: true
        schema:
          format: date-time
          type: string
        style: form
      - description: Количество строк в ответе
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100000
          maximum: 100000
          type: integer
        style: form
      - description: |
          Уникальный ID строки отчёта. Необходим для получения отчёта частями.
          <br>
          Загрузку отчёта нужно начинать с `rrdid = 0` и при последующих вызовах API передавать в запросе значение `rrd_id` из последней строки, полученной в результате предыдущего вызова.
          <br>
          Таким образом, для загрузки одного отчёта может понадобиться вызывать API до тех пор, пока не вернётся ответ 204.
        explode: true
        in: query
        name: rrdid
        required: false
        schema:
          default: 0
          type: integer
        style: form
      - description: |
          Периодичность отчёта:
            - `weekly` — еженедельный
            - `daily` — ежедневный
        explode: true
        in: query
        name: period
        required: false
        schema:
          default: weekly
          enum:
          - weekly
          - daily
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/DetailReportItem"
                type: array
          description: Успешно
        "204":
          description: Нет данных
        "400":
          content:
            application/json:
              example:
                status: 400
                title: GetReportDetailByPeriodNB decode error
                detail: "GetReportDetailByPeriodNB decode error: missing dateTo params"
                request_id: b065c204-c5f7-431b-b12c-d4c2cc6347ec
                origin: open-api
              schema:
                $ref: "#/components/schemas/_api_v5_supplier_reportDetailByPeriod_get_400_response"
          description: Неправильный запрос
        "401":
          content:
            application/problem+json:
              example:
                title: unauthorized
                detail: "token problem; token is malformed: could not base64 decode\
                  \ signature: illegal base64 data at input byte 84"
                code: "07e4668e--a53a3d31f8b0-[UK-oWaVDUqNrKG]; 03bce=277; 84bd353bf-75"
                requestId: 7b80742415072fe8b6b7f7761f1d1211
                origin: s2s-api-auth-catalog
                status: 401
                statusText: Unauthorized
                timestamp: 2024-09-30T06:52:38Z
              schema:
                $ref: "#/components/schemas/_api_v1_account_balance_get_401_response"
          description: Не авторизован
        "402":
          content:
            application/problem+json:
              example:
                title: payment required
                detail: "please top up your balance in your company personal account\
                  \ https://dev.{{ .baseDomain }}/company"
              schema:
                $ref: "#/components/schemas/_api_v1_account_balance_get_402_response"
          description: Требуется платёж
        "429":
          content:
            application/problem+json:
              example:
                title: too many requests
                detail: limited by c122a060-a7fb-4bb4-abb0-32fd4e18d489
                code: "07e4668e-ac2242c5c8c5-[UK-4dx7JUdskGZ]"
                requestId: 9d3c02cc698f8b041c661a7c28bed293
                origin: s2s-api-auth-catalog
                status: 429
                statusText: Too Many Requests
                timestamp: 2024-09-30T06:52:38Z
              schema:
                $ref: "#/components/schemas/_api_v1_account_balance_get_401_response"
          description: Слишком много запросов
      security:
      - HeaderApiKey: []
      summary: Отчёт о продажах по реализации
      tags:
      - Финансовые отчёты
      x-readonly-method: true
      x-category: statistics
    servers:
    - url: https://statistics-api.wildberries.ru
  /api/v1/documents/categories:
