    AcquiringReportsDetailedReq:
      description: Параметры запроса
      example:
        dateFrom: 2026-03-17
        dateTo: 2026-03-20
        limit: 21100
        rrdId: 0
        fields:
        - rrdId
        - nmId
        - docTypeName
        - retailAmount
        - acquiringFee
        - srid
      properties:
        dateFrom:
          description: |
            Начальная дата отчёта.<br>Можно передать дату или дату со временем. Время можно указывать с точностью до секунд или миллисекунд.<br>Дата передаётся в формате [RFC3339](https://datatracker.ietf.org/doc/html/rfc3339), время — в часовом поясе Москва `UTC+3`.<br>Примеры:
              - `2025-06-20`
              - `2025-06-20T23:59:59`
              - `2025-06-20T00:00:00.12345`
              - `2025-06-20T00:00:00`
          example: 2026-03-17
          type: string
        dateTo:
          description: |
            Конечная дата отчёта.<br>Дата в формате [RFC3339](https://datatracker.ietf.org/doc/html/rfc3339). Можно передать дату или дату со временем. Время можно указывать с точностью до секунд или миллисекунд.<br>Время передаётся в часовом поясе Москва `UTC+3`.<br>Примеры:
              - `2025-06-20`
              - `2025-06-20T23:59:59`
              - `2025-06-20T00:00:00.12345`
              - `2025-06-20T00:00:00`
          example: 2026-03-20
          type: string
        limit:
          default: 100000
          description: Количество строк в ответе
          example: 21100
          maximum: 100000
          type: integer
        rrdId:
          default: 0
          description: |
            ID строки ответа. Необходим для получения отчёта частями.<br>Начинайте загрузку отчёта с `"rrdid":0`. В последующих запросах передавайте значение `rrdId` из последней строки предыдущего ответа.<br>Повторяйте запрос, пока не получите ответ `204`
          type: integer
        fields:
          description: "Список полей, которые вернутся в ответе. Если параметр не\
            \ указан, возвращаются все поля"
          example:
          - rrdId
          - nmId
          - docTypeName
          - retailAmount
          - acquiringFee
          - srid
          items:
            type: string
          type: array
      required:
      - dateFrom
      - dateTo
      type: object
