        | Сервисный | 10 сек | 1 запрос | 10 сек | 5 запросов |
        | Базовый с секретом | 10 сек | 1 запрос | 10 сек | 5 запросов |
        | Базовый | 24 ч | 1 запрос | 24 ч | 1 запрос |
        </div>
      parameters:
      - description: |
          Язык поля `category`:
            - `ru` — русский
            - `en` — английский
            - `zh` — китайский
        explode: true
        in: query
        name: locale
        required: false
        schema:
          default: en
          example: ru
          type: string
        style: form
      - description: Начало периода. Только вместе с `endTime`
        explode: true
        in: query
        name: beginTime
        required: false
        schema:
          example: 2024-07-09
          format: date
          type: string
        style: form
      - description: Конец периода. Только вместе с `beginTime`
        explode: true
        in: query
        name: endTime
        required: false
        schema:
          example: 2024-07-15
          format: date
          type: string
        style: form
      - description: |
          Сортировка:
            - `date` — по дате создания документа
            - `category` — по категории (только при `locale=ru`)

