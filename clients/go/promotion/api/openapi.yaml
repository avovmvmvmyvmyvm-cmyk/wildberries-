          - `id` — по ID медиакампании
        explode: true
        in: query
        name: order
        required: false
        schema:
          example: id
          type: string
        style: form
      - description: |
          Порядок сортировки:
          - `desc` — от большего к меньшему
          - `asc` — от меньшего к большему
        explode: true
        in: query
        name: direction
        required: false
        schema:
          example: desc
          type: string
        style: form
