openapi: 3.0.1
info:
  description: |
    <div class="description_important">
        Узнать больше о маркетинге и продвижении можно в <a href="https://seller.wildberries.ru/instructions/category/59d92bd3-6ea0-40f2-b762-ca8835d7d42e?goBackOption=prevRoute&categoryId=479385c6-de01-4b4d-ad4e-ed941e65582e">справочном центре</a>
    </div>

    Методы маркетинга и продвижения позволяют:
      1. Получать информацию о кампаниях [продвижения](/openapi/promotion#tag/Kampanii) и [медиакампаниях](/openapi/promotion#tag/Media).
      2. [Создавать](/openapi/promotion#tag/Sozdanie-kampanij) и [управлять](/openapi/promotion#tag/Upravlenie-kampaniyami) кампаниями.
      3. Настраивать [параметры](/openapi/promotion#tag/Parametry-kampanij) кампаний — кластеры фраз, продвигаемые товары и так далее.
      4. Управлять [финансами](/openapi/promotion#tag/Finansy) кампаний.
      5. Выгружать [статистику](/openapi/promotion#tag/Statistika) кампаний продвижения и медиакампаний.
      6. Работать с [календарём акций](/openapi/promotion#tag/Kalendar-akcij).

    Данные синхронизируются с базой раз в 3 минуты. Статусы кампаний меняются раз в минуту. Ставки кампаний меняются раз в 30 секунд.
  title: Маркетинг и продвижение
  version: promotion
  x-file-name: promotion
servers:
- url: /
security:
- HeaderApiKey: []
tags:
- description: ""
  name: Кампании
- description: ""
  name: Создание кампаний
- description: ""
  name: Управление кампаниями
- description: ""
  name: Параметры кампаний
- description: ""
  name: Поисковые кластеры
- description: ""
  name: Финансы
- description: ""
  name: Медиа
- description: ""
  name: Статистика
- description: ""
  name: Календарь акций
paths:
  /adv/v1/promotion/count:
    get:
      description: |
        Метод возвращает списки всех [рекламных кампаний](/openapi/promotion#tag/Kampanii/paths/~1api~1advert~1v2~1adverts/get) продавца с их ID. Кампании сгруппированы по типу и статусу, у каждой указана дата последнего изменения.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:

        | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- |
        | 1 секунда | 5 запросов | 200 миллисекунд | 5 запросов |
        </div>
      responses:
        "200":
          content:
            application/json:
              example:
                adverts:
                - type: 9
                  status: 8
                  count: 3
                  advert_list:
                  - advertId: 6485174
                    changeTime: 2023-05-10T12:12:52.676254+03:00
                  - advertId: 6500443
                    changeTime: 2023-05-10T17:08:46.370656+03:00
                  - advertId: 7936341
                    changeTime: 2023-07-12T15:51:08.367478+03:00
                all: 3
              schema:
                $ref: "#/components/schemas/_adv_v1_promotion_count_get_200_response"
          description: Успешно
        "401":
          content:
            application/problem+json:
              example:
                title: unauthorized
                detail: "token problem; token is malformed: could not base64 decode\
                  \ signature: illegal base64 data at input byte 84"
                code: "07e4668e--a53a3d31f8b0-[UK-oWaVDUqNrKG]; 03bce=277; 84bd353bf-75"
                requestId: 7b80742415072fe8b6b7f7761f1d1211
                origin: s2s-api-auth-catalog
                status: 401
                statusText: Unauthorized
                timestamp: 2024-09-30T06:52:38Z
              schema:
                $ref: "#/components/schemas/_adv_v1_promotion_count_get_401_response"
          description: Не авторизован
        "429":
          content:
            application/problem+json:
              example:
                title: too many requests
                detail: limited by c122a060-a7fb-4bb4-abb0-32fd4e18d489
                code: "07e4668e-ac2242c5c8c5-[UK-4dx7JUdskGZ]"
                requestId: 9d3c02cc698f8b041c661a7c28bed293
                origin: s2s-api-auth-catalog
                status: 429
                statusText: Too Many Requests
                timestamp: 2024-09-30T06:52:38Z
              schema:
                $ref: "#/components/schemas/_adv_v1_promotion_count_get_401_response"
          description: Слишком много запросов
      security:
      - HeaderApiKey: []
      summary: Списки кампаний
      tags:
      - Кампании
      x-readonly-method: true
      x-category: advert
    servers:
    - url: https://advert-api.wildberries.ru
  /adv/v1/promotion/adverts:
    post:
      deprecated: true
      description: |
        Данный метод устарел. Он будет удалён [2 февраля](https://dev.wildberries.ru/release-notes?id=388)
      parameters:
      - description: |
          Статус кампании:
          - `-1` — удалена, процесс удаления будет завершён в течение 10 минут
          - `4` — готова к запуску
          - `7` — завершена
          - `8` — отменена
          - `9` — активна
          - `11` — на паузе
        explode: true
        in: query
        name: status
        required: false
        schema:
          enum:
          - -1
          - 4
          - 7
          - 8
          - 9
          - 11
          type: integer
        style: form
      - description: |
          Тип кампании:
          - `8` — единая ставка
        explode: true
        in: query
        name: type
        required: false
        schema:
          enum:
          - 8
          type: integer
        style: form
      - description: |
          Порядок:
          - `create` — по времени создания кампании
          - `change` — по времени последнего изменения кампании
          - `id` — по ID кампании
        explode: true
        in: query
        name: order
        required: false
        schema:
          enum:
          - create
          - change
          - id
          type: string
        style: form
      - description: |
          Направление:
          - `desc` — от большего к меньшему
          - `asc` — от меньшего к большему
        explode: true
        in: query
        name: direction
        required: false
        schema:
          enum:
          - desc
          - asc
          type: string
        style: form
      requestBody:
        content:
          application/json:
            example:
            - 1234567
            - 63453471
            schema:
              items:
                description: "Список ID кампаний. Максимум 50. <br> <br> Получить\
                  \ ID кампаний можно методом [Списки кампаний](./promotion#tag/Kampanii/paths/~1adv~1v1~1promotion~1count/get)"
                type: integer
              type: array
        required: true
      responses:
        "200":
          content:
            application/json:
              examples:
                ResponseInfoAdvertType8:
                  $ref: "#/components/examples/ResponseInfoAdvertType8"
                ResponseInfoAdvertsAll:
                  $ref: "#/components/examples/ResponseInfoAdvertsAll"
              schema:
                items:
                  $ref: "#/components/schemas/ResponseInfoAdvertType8"
                type: array
          description: Успешно
        "204":
          description: Кампании не найдены
        "400":
          content:
            text/plain:
              examples:
                IncorrectTypeAdv:
                  $ref: "#/components/examples/IncorrectTypeAdv"
                IncorrectSupplierIdAdv:
                  $ref: "#/components/examples/IncorrectSupplierIdAdv"
                IncorrectUsingMethods:
                  $ref: "#/components/examples/IncorrectUsingMethods"
              schema:
                type: string
          description: Неправильный запрос
        "401":
          content:
            application/problem+json:
              example:
                title: unauthorized
                detail: "token problem; token is malformed: could not base64 decode\
                  \ signature: illegal base64 data at input byte 84"
                code: "07e4668e--a53a3d31f8b0-[UK-oWaVDUqNrKG]; 03bce=277; 84bd353bf-75"
                requestId: 7b80742415072fe8b6b7f7761f1d1211
                origin: s2s-api-auth-catalog
                status: 401
                statusText: Unauthorized
                timestamp: 2024-09-30T06:52:38Z
              schema:
                $ref: "#/components/schemas/_adv_v1_promotion_count_get_401_response"
          description: Не авторизован
        "422":
          content:
            text/plain:
              examples:
                ErrorProcessRequestParam:
                  $ref: "#/components/examples/ErrorProcessRequestParam"
              schema:
                type: string
          description: Ошибка обработки параметров запроса
        "429":
          content:
            application/problem+json:
              example:
                title: too many requests
                detail: limited by c122a060-a7fb-4bb4-abb0-32fd4e18d489
                code: "07e4668e-ac2242c5c8c5-[UK-4dx7JUdskGZ]"
                requestId: 9d3c02cc698f8b041c661a7c28bed293
                origin: s2s-api-auth-catalog
                status: 429
                statusText: Too Many Requests
                timestamp: 2024-09-30T06:52:38Z
              schema:
                $ref: "#/components/schemas/_adv_v1_promotion_count_get_401_response"
          description: Слишком много запросов
      security:
      - HeaderApiKey: []
      summary: Информация о кампаниях
      tags:
      - Кампании
      x-readonly-method: true
      x-category: advert
    servers:
