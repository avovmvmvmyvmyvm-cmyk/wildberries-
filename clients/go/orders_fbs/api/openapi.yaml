      nullable: true
      properties:
        orders:
          description: "Сборочные задания, метаданные которых не прошли или ещё не\
            \ завершили валидацию"
          items:
            $ref: "#/components/schemas/_409SupplyDeliverError_data_orders_inner"
          type: array
      type: object
