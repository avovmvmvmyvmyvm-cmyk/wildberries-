      - description: Год создания заказа
        example: 2023
        explode: true
        in: query
        name: year
        required: true
        schema:
          type: integer
        style: form
      - description: Месяц создания заказа
        example: 2
        explode: true
        in: query
        name: month
        required: true
        schema:
          maximum: 12
          minimum: 1
          type: integer
        style: form
      - description: "Параметр пагинации. Устанавливает значение, с которого надо\
          \ получить следующий пакет данных. Для получения полного списка данных д\
          олжен быть равен `0` в первом запросе. Для следующих запросов необходимо\
          \ брать значения из одноимённого поля в ответе."
        example: 0
        explode: true
        in: query
        name: next
        required: true
        schema:
          format: int64
          type: integer
        style: form
      - description: Количество сборочных заданий в ответе
        example: 150
        explode: true
        in: query
        name: limit
        required: true
        schema:
          default: 100
