    MetaDetails_inner:
      example:
        key: uin
        value: value
        decision: uinMaySell
      properties:
        key:
          description: Маркировка
          example: uin
          type: string
        value:
          description: Значение
          nullable: true
          type: string
          example: null
        decision:
          description: |
            Статус:
            - `imei`
              - `filled` — Валидация пройдена
              - `deadlineExceeded` — Валидация пройдена
              - `optional` — Маркировка не обязательна
              - `pending` — Маркировка на проверке
              - `required` — Обязательная маркировка не заполнена. Валидация не пройдена
              - `imeiInvalidFormat` — Неверный формат маркировки. Валидация не пройдена
              - `imeiAlreadySold` — Товар с этим IMEI уже продан. Валидация не пройдена
            - `uin`
              - `filled` — Валидация пройдена
              - `deadlineExceeded` — Валидация пройдена
              - `optional` — Маркировка не обязательна
              - `pending` — Маркировка на проверке
              - `uinMaySell` — Валидация пройдена
              - `required` — Маркировка обязательна, не заполнена. Валидация не пройдена
              - `uinBadStatus` — Некорректный статус партии. Валидация не пройдена
              - `uinBadProcess` — Некорректная стадия обработки. Валидация не пройдена
              - `uinBadStatusAndBadProcess` — Некорректный статус партии. Некорректная стадия обработки. Валидация не пройдена
              - `uinInvalidFormat` — Неверный формат маркировки. Валидация не пройдена
              - `uinNotFound` — Не найден в [ГИИС](https://minfin.gov.ru/ru/perfomance/jewels/dmdk). Валидация не пройдена.
                Статус может означать, что УИН:
                  - не указан в загруженной спецификации с договором на поставку
                  - не зарегистрирован в ГИИС ДМДК
                  - указан некорректно и считывается с бирки с ошибками
                  - не находится в обороте
            - `sgtin`
              - `filled` — Валидация пройдена
              - `deadlineExceeded` — Валидация пройдена
              - `optional` — Маркировка не обязательна
              - `pending` — Маркировка на проверке
              - `required` — Маркировка обязательна, не заполнена. Валидация не пройдена
              - `sgtinInvalidFormat` — Неверный формат маркировки. Валидация не пройдена
              - `sgtinNotFound` — Маркировка не найдена в [Честном знаке](https://chestnyznak.ru). Валидация не пройдена
              - `sgtinEmitted` —  Маркировка эмитирована. Валидация не пройдена
              - `sgtinApplied` — Не пройдена процедура Ввод в оборот. Валидация не пройдена
              - `sgtinWrittenOff` — Списан. Валидация не пройдена
              - `sgtinRetired` — Выбыл. Валидация не пройдена
              - `sgtinDisaggregated` — Расформирован. Валидация не пройдена
              - `sgtinAppliedNotPaid` — Не оплачен. Валидация не пройдена
            - `gtin`
              - `filled` — Валидация пройдена
              - `optional` — Маркировка не обязательна
              - `required` — Маркировка обязательна, не заполнена. Валидация не пройдена
            - `expiration`
              - `filled` — Валидация пройдена
              - `optional` — Маркировка не обязательна
              - `required` — Маркировка обязательна, не заполнена. Валидация не пройдена
            - `customsDeclaration`
              - `filled` — Валидация пройдена
              - `required` — Маркировка обязательна, не заполнена. Валидация не пройдена
          example: uinMaySell
          type: string
      type: object
