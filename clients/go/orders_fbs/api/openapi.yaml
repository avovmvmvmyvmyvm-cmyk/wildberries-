          type: integer
        requiredMeta:
          description: |
            Список метаданных, которые необходимо добавить в сборочное задание, чтобы поставку с этим сборочным заданием можно было перевести в доставку
          example:
          - uin
          items:
            type: string
          nullable: true
          type: array
        optionalMeta:
          description: |
            Список метаданных, которые можно добавить в сборочное задание.<br>
            Поставку со сборочным заданием без этих метаданных можно перевести в доставку, но они могут потребоваться, например, при возврате товара покупателем
          example:
          - sgtin
          items:
            type: string
          nullable: true
          type: array
        deliveryType:
          description: |
            Тип доставки:
            - `fbs` — доставка на склад Wildberries (FBS)
          enum:
          - fbs
          nullable: false
          type: string
        comment:
          description: Комментарий покупателя
          example: "Упакуйте в плёнку, пожалуйста"
          maxLength: 300
          nullable: false
          type: string
        scanPrice:
          description: Цена приёмки в копейках. Отображается после фактической приёмки
            заказа. Для данного метода всегда будет возвращаться `null`. Предоставляется
            в информационных целях
          format: uint32
          nullable: true
          type: number
          example: null
        orderUid:
          description: ID транзакции для группировки сборочных заданий. Сборочные
            задания в одной корзине покупателя будут иметь одинаковый `orderUid`
          example: 165918930_629fbc924b984618a44354475ca58675
          type: string
        article:
          description: Артикул продавца
          example: one-ring-7548
          nullable: false
          type: string
        colorCode:
          description: Код цвета (только для колеруемых товаров)
          example: RAL 3017
          nullable: false
          type: string
        rid:
          description: |
            Уникальный ID заказа. <br>
            Примечание: `rid` — это `srid` в ответах методов:
              - [Заявки покупателей на возврат](./user-communication#tag/Vozvraty-pokupatelyami/paths/~1api~1v1~1claims/get)
              - [Заказы](./reports#tag/Osnovnye-otchyoty/paths/~1api~1v1~1supplier~1orders/get)
              - [Продажи](./reports#tag/Osnovnye-otchyoty/paths/~1api~1v1~1supplier~1sales/get)
              - [Отчёт о возвратах и перемещении товаров](./reports#tag/Otchyot-o-vozvratah-i-peremeshenii-tovarov)
              - [Детализации к отчётам реализации по ID отчётов](./financial-reports-and-accounting#tag/Finansovye-otchyoty/operation/postV1SalesReportsDetailedReportId)
              - [Детализации к отчётам реализации за период](./financial-reports-and-accounting#tag/Finansovye-otchyoty/operation/postV1SalesReportsDetailed)
              - [Детализации к отчётам об издержках на приём платежей по ID отчётов](./financial-reports-and-accounting#tag/Finansovye-otchyoty/operation/postV1AcquiringDetailedReportId)
              - [Детализации к отчётам об издержках на приём платежей за период](./financial-reports-and-accounting#tag/Finansovye-otchyoty/operation/postV1AcquiringDetailed)
          example: f884001e44e511edb8780242ac120002
          nullable: false
          type: string
        createdAt:
          description: Дата создания сборочного задания (RFC3339)
          example: 2022-05-04T07:56:29Z
          format: date-time
          nullable: false
          type: string
        offices:
          description: "Список офисов, куда следует привезти товар"
          items:
            example: Калуга
            type: string
          nullable: true
          type: array
        skus:
          description: Список баркодов
          items:
            example: "6665956397512"
            type: string
          nullable: false
          type: array
        id:
          description: ID сборочного задания
          example: 13833711
          format: int64
          nullable: false
          type: integer
        warehouseId:
          description: "ID склада продавца, на который поступило сборочное задание"
          example: 658434
          nullable: false
          type: integer
        officeId:
          description: "ID склада WB, к которому привязан склад продавца"
          example: 123
          format: int64
          nullable: false
          type: integer
        nmId:
          description: Артикул WB
          example: 123456789
          nullable: false
          type: integer
        chrtId:
          description: ID размера товара в системе WB
          example: 987654321
          nullable: false
          type: integer
        price:
          description: |
            Цена в валюте продажи с учётом всех скидок, кроме скидки по WB Кошельку, умноженная на 100. Код валюты продажи — в поле `currencyCode`. Предоставляется в информационных целях
          example: 1014
          nullable: false
          type: integer
        finalPrice:
          description: "Сумма к оплате покупателем в валюте продажи с учетом всех\
            \ скидок, умноженная на 100. Код валюты продажи указан в поле `currencyCode`.\
            \ Предоставляется в информационных целях"
          example: 1014
          type: integer
        convertedPrice:
          description: "Цена в валюте страны продавца с учетом всех скидок, кроме\
            \ скидки по WB Кошельку, умноженная на 100. Предоставляется в информац\
            ионных целях"
          example: 28322
          nullable: false
          type: integer
        convertedFinalPrice:
          description: "Сумма к оплате покупателем в валюте страны продавца с учет\
            ом всех скидок, умноженная на 100. Предоставляется в информационных це\
            лях"
          example: 1014
          type: integer
        currencyCode:
          description: Код валюты продажи
          example: 933
          format: ISO 4217
          nullable: false
          type: integer
        convertedCurrencyCode:
          description: Код валюты страны продавца
          example: 643
          format: ISO 4217
          nullable: false
          type: integer
        cargoType:
          description: |
            Тип товара:
              - `1` — малогабаритный товар (МГТ)
              - `2` — сверхгабаритный товар (СГТ)
              - `3` — крупногабаритный товар (КГТ+)
          enum:
          - 1
          - 2
          - 3
          nullable: false
          type: integer
        crossBorderType:
          description: |
            Тип сборочного задания:
              - `0` — внутренняя поставка
              - `1` — трансграничная поставка
          enum:
          - 0
          - 1
          example: 1
          format: int32
          nullable: false
          type: integer
        isZeroOrder:
          description: |
            Признак заказа товара с нулевым остатком:
              - `false` — заказ сделан на товар с ненулевым остатком
              - `true` — заказ сделан на товар с нулевым остатком. Такой заказ можно отменить без штрафа за отмену
          example: false
          type: boolean
        options:
          $ref: "#/components/schemas/Order_options"
      type: object
