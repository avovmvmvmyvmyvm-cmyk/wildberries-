version: 0.1

specs:
  - https://dev.wildberries.ru/api/swagger/yaml/ru/01-general.yaml?region=ru
  - https://dev.wildberries.ru/api/swagger/yaml/ru/02-products.yaml?region=ru
  - https://dev.wildberries.ru/api/swagger/yaml/ru/03-orders-fbs.yaml?region=ru
  - https://dev.wildberries.ru/api/swagger/yaml/ru/04-orders-dbw.yaml?region=ru
  - https://dev.wildberries.ru/api/swagger/yaml/ru/05-orders-dbs.yaml?region=ru
  - https://dev.wildberries.ru/api/swagger/yaml/ru/06-in-store-pickup.yaml?region=ru
  - https://dev.wildberries.ru/api/swagger/yaml/ru/07-orders-fbw.yaml?region=ru
  - https://dev.wildberries.ru/api/swagger/yaml/ru/08-promotion.yaml?region=ru
  - https://dev.wildberries.ru/api/swagger/yaml/ru/09-communications.yaml?region=ru
  - https://dev.wildberries.ru/api/swagger/yaml/ru/10-tariffs.yaml?region=ru
  - https://dev.wildberries.ru/api/swagger/yaml/ru/11-analytics.yaml?region=ru
  - https://dev.wildberries.ru/api/swagger/yaml/ru/12-reports.yaml?region=ru
  - https://dev.wildberries.ru/api/swagger/yaml/ru/13-finances.yaml?region=ru

templates:
  base_dir: tools/templates
  files:
    common:
      - api.mustache
      - model.mustache
      - api_client.mustache
      - configuration.mustache
      - README.mustache
    python:
      - pyproject.mustache
      - setup.mustache

languages:
  - name: python
    generator: python
    output_dir: clients/python
    package_name_prefix: wildberries-sdk
  - name: typescript
    generator: typescript-fetch
    output_dir: clients/npm
    package_name_prefix: wildberries-sdk
  - name: go
    generator: go
    output_dir: clients/go
  - name: php
    generator: php
    output_dir: clients/php
  - name: rust
    generator: rust
    output_dir: clients/rust
    package_name_prefix: wildberries-sdk
